<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Touch Messenger</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        :root{
            --bg:#f5f5f5;
            --bg2:#ffffff;
            --card:#fafafa;
            --card2:#f0f0f0;
            --border:#e0e0e0;
            --border2:#d0d0d0;
            --text:#1a1a1a;
            --text2:#666666;
            --text3:#999999;
            --red:#e53935;
            --red2:#ff4d4d;
            --red3:#c62828;
            --font:'Inter',sans-serif;
            --head:'Space Grotesk',sans-serif;
            --radius:12px;
            --radius-lg:16px;
            --transition:180ms ease;
        }
        body{
            font-family:var(--font);
            background:var(--bg);
            color:var(--text);
            height:100vh;
            height:100dvh;
            overflow:hidden;
            -webkit-tap-highlight-color:transparent;
            -webkit-font-smoothing:antialiased;
            -moz-osx-font-smoothing:grayscale;
            letter-spacing:-0.01em;
        }
        button{
            cursor:pointer;
            border:none;
            background:none;
            color:inherit;
            font-family:inherit;
            font-size:inherit;
            transition:all var(--transition);
        }
        button:active{transform:scale(0.97)}
        input{
            font-family:inherit;
            background:none;
            border:none;
            color:var(--text);
            outline:none;
            font-size:15px;
            letter-spacing:-0.01em;
        }
        input::placeholder{color:var(--text3)}
        ::-webkit-scrollbar{width:4px}
        ::-webkit-scrollbar-track{background:transparent}
        ::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px}
        ::-webkit-scrollbar-thumb:hover{background:#bbb}

        /* ХЕДЕР */
        .header{
            height:60px;
            background:var(--bg2);
            border-bottom:2px solid var(--red);
            display:flex;
            align-items:center;
            justify-content:space-between;
            padding:0 20px;
            z-index:100;
        }
        .header-left{display:flex;align-items:center;gap:12px}
        .back-btn{
            display:none;
            width:34px;height:34px;
            border-radius:var(--radius);
            align-items:center;justify-content:center;
            color:var(--text2);font-size:16px;
        }
        .back-btn:hover{background:var(--card2);color:var(--text)}
        .logo-text{
            font-family:var(--head);
            font-size:19px;
            font-weight:600;
            color:var(--text);
        }
        .header-right{display:flex;gap:6px}
        .hbtn{
            width:36px;height:36px;
            border-radius:var(--radius);
            display:flex;align-items:center;justify-content:center;
            color:var(--text2);
        }
        .hbtn:hover{background:var(--card2);color:var(--text)}
        .ava-sm{
            width:32px;height:32px;
            background:var(--red);
            border-radius:50%;
            display:flex;align-items:center;justify-content:center;
            font-weight:600;font-size:13px;color:#fff;
        }

        /* ОСНОВНОЙ КОНТЕЙНЕР */
        .app{
            display:flex;
            height:calc(100vh - 60px);
            height:calc(100dvh - 60px);
            position:relative;
            overflow:hidden;
        }

        /* ЭКРАН ЧАТОВ */
        .chats-screen{
            width:100%;max-width:380px;
            background:var(--bg2);
            border-right:1px solid var(--border);
            display:flex;flex-direction:column;
            flex-shrink:0;
        }
        .search-wrap{padding:14px}
        .search-box{
            background:var(--bg);
            border:1px solid var(--border);
            border-radius:var(--radius);
            padding:9px 14px;
            display:flex;align-items:center;
            gap:10px;
        }
        .search-box:focus-within{border-color:var(--red)}
        .search-box svg{flex-shrink:0;opacity:.4}
        .search-box input{flex:1;font-size:14px;background:transparent}
        .new-chat-btn{
            margin:0 14px 10px;
            padding:11px;
            background:var(--red);
            color:#fff;
            border-radius:var(--radius);
            font-weight:500;font-size:14px;
            display:flex;align-items:center;justify-content:center;
            gap:6px;
        }
        .new-chat-btn:hover{background:var(--red2)}
        .chats-list{flex:1;overflow-y:auto;padding:4px 8px}
        .chat-item{
            display:flex;align-items:center;
            padding:10px 12px;
            border-radius:var(--radius-lg);
            cursor:pointer;
            margin-bottom:2px;gap:12px;
        }
        .chat-item:hover{background:var(--card)}
        .chat-item.active{background:var(--card);border-left:3px solid var(--red)}
        .ava{
            width:44px;height:44px;
            border-radius:50%;
            background:var(--card2);
            border:2px solid var(--border);
            display:flex;align-items:center;justify-content:center;
            font-weight:600;font-size:16px;color:var(--text2);
            flex-shrink:0;
        }
        .chat-info{flex:1;min-width:0}
        .chat-name{font-weight:500;font-size:14px;margin-bottom:3px;color:var(--text)}
        .chat-last{font-size:12px;color:var(--text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

        /* ЭКРАН СООБЩЕНИЙ */
        .chat-screen{flex:1;display:flex;flex-direction:column;background:var(--bg);min-width:0}
        .chat-header{
            height:60px;padding:0 20px;
            display:flex;align-items:center;justify-content:space-between;
            border-bottom:1px solid var(--border);
            background:var(--bg2);
            flex-shrink:0;
        }
        .chat-header-info{display:flex;align-items:center;gap:12px;min-width:0}
        .ava-lg{
            width:40px;height:40px;
            border-radius:50%;
            background:var(--card2);
            border:2px solid var(--border);
            display:flex;align-items:center;justify-content:center;
            font-weight:600;font-size:15px;color:var(--text2);
            flex-shrink:0;
        }
        .chat-header-text{min-width:0}
        .chat-title{
            font-family:var(--head);
            font-size:15px;font-weight:600;
            cursor:pointer;
            white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
        }
        .chat-title:hover{color:var(--red)}
        .chat-status{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--text3)}
        .status-dot{width:6px;height:6px;border-radius:50%;background:#4CAF50;flex-shrink:0}
        .chat-actions{display:flex;gap:4px;flex-shrink:0}

        /* СООБЩЕНИЯ */
        .messages{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:4px}
        .messages-center{
            display:flex;align-items:center;justify-content:center;
            height:100%;color:var(--text3);font-size:13px;
            text-align:center;padding:20px;
        }
        .msg{display:flex;margin-bottom:4px}
        .msg.in{justify-content:flex-start}
        .msg.out{justify-content:flex-end}
        .msg-bubble{
            max-width:65%;
            padding:10px 14px;
            border-radius:var(--radius-lg);
            animation:msgIn .2s ease;
        }
        .msg.in .msg-bubble{
            background:var(--bg2);
            border:1px solid var(--border);
            color:var(--text);
            border-bottom-left-radius:6px;
        }
        .msg.out .msg-bubble{
            background:var(--red);
            color:#fff;
            border-bottom-right-radius:6px;
        }
        .msg-bubble p{font-size:14px;line-height:1.45;margin-bottom:3px;word-wrap:break-word}
        .msg-bubble .time{font-size:10px;opacity:.6;text-align:right}
        @keyframes msgIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

        /* ПОЛЕ ВВОДА */
        .input-area{
            padding:14px 20px;
            background:var(--bg2);
            border-top:1px solid var(--border);
            display:flex;align-items:center;gap:10px;
            flex-shrink:0;
        }
        .input-area input{
            flex:1;
            padding:10px 16px;
            background:var(--bg);
            border:1px solid var(--border);
            border-radius:22px;
            font-size:14px;
        }
        .input-area input:focus{border-color:var(--red)}
        .send-btn{
            width:40px;height:40px;
            background:var(--red);
            color:#fff;
            border-radius:50%;
            display:flex;align-items:center;justify-content:center;
            flex-shrink:0;
            font-family:monospace;font-size:16px;
        }
        .send-btn:hover{background:var(--red2)}
.msg-status {
    font-size: 9px;
    text-align: right;
    margin-top: 2px;
    font-family: monospace;
}
        /* МОДАЛКИ */
        .modal{
            display:none;
            position:fixed;top:0;left:0;right:0;bottom:0;
            background:rgba(0,0,0,.4);
            z-index:200;
            align-items:center;justify-content:center;
            padding:20px;
        }
        .modal.show{display:flex}
        .modal-content{
            background:var(--bg2);
            border-radius:var(--radius-lg);
            padding:28px;
            width:100%;max-width:380px;
            position:relative;
            border:1px solid var(--border);
            box-shadow:0 4px 24px rgba(0,0,0,.08);
        }
        .modal-content h2{
            font-family:var(--head);
            font-size:19px;
            text-align:center;
            margin-bottom:20px;
            font-weight:600;
        }
        .modal-input{
            width:100%;
            padding:11px 16px;
            background:var(--bg);
            border:1px solid var(--border);
            border-radius:var(--radius);
            font-size:14px;
            margin-bottom:12px;
        }
        .modal-input:focus{border-color:var(--red)}
        .modal-btn{
            width:100%;
            padding:11px;
            background:var(--red);
            color:#fff;
            border-radius:var(--radius);
            font-weight:500;font-size:14px;
            margin-bottom:10px;
        }
        .modal-btn:hover{background:var(--red2)}
        .modal-switch{text-align:center;color:var(--text2);font-size:13px}
        .modal-switch span{color:var(--red);cursor:pointer}
        .modal-switch span:hover{color:var(--red2)}
        .modal-error{color:var(--red);font-size:12px;text-align:center;margin-bottom:10px;display:none}
        .modal-close{
            position:absolute;top:10px;right:14px;
            font-size:18px;color:var(--text3);cursor:pointer;
            width:32px;height:32px;
            display:flex;align-items:center;justify-content:center;
            border-radius:50%;
            font-family:monospace;
        }
        .modal-close:hover{background:var(--card2);color:var(--text)}

        /* ПРОФИЛЬ */
        .prof-ava{
            width:72px;height:72px;
            border-radius:50%;
            background:var(--card2);
            border:2px solid var(--border);
            display:flex;align-items:center;justify-content:center;
            font-weight:700;font-size:26px;color:var(--text2);
            margin:0 auto 14px;
        }
        .prof-tid{
            background:var(--bg);
            border-radius:var(--radius);
            padding:9px 14px;margin:12px 0;
            font-size:13px;text-align:center;
            border:1px solid var(--border);
        }
        .prof-row{
            display:flex;justify-content:space-between;
            padding:9px 0;
            border-bottom:1px solid var(--border);
            font-size:13px;
        }
        .prof-row .lbl{color:var(--text3)}
        .logout-btn{
            width:100%;padding:11px;
            background:transparent;
            color:var(--red);
            border:1px solid var(--red);
            border-radius:var(--radius);
            font-weight:500;font-size:14px;
            margin-top:16px;
        }
        .logout-btn:hover{background:var(--red);color:#fff}

        /* БЕЙДЖИ */
        .unread-badge{
            background:var(--red);
            color:#fff;
            border-radius:10px;
            padding:3px 7px;
            font-size:10px;
            font-weight:700;
            flex-shrink:0;
            min-width:18px;
            text-align:center;
            line-height:1.3;
        }
        .msg-bubble.deleted{
            opacity:.4;
            font-style:italic;
            background:var(--card2)!important;
            color:var(--text3)!important;
            border:1px dashed var(--border2)!important;
        }
        @keyframes fadeIn{from{opacity:0;transform:scale(.97)}to{opacity:1;transform:scale(1)}}

        /* СПЛЕШ-СКРИН */
        .splash-screen{
            position:fixed;top:0;left:0;right:0;bottom:0;
            background:var(--bg2);
            display:flex;flex-direction:column;
            align-items:center;justify-content:center;
            z-index:9999;
            transition:opacity .4s ease;
        }
        .splash-screen.hide{opacity:0;pointer-events:none}
        .splash-logo{width:72px;height:72px;border-radius:18px;margin-bottom:18px;animation:pulse 2.5s infinite}
        .splash-title{font-family:var(--head);font-size:26px;font-weight:700;margin-bottom:6px;color:var(--text)}
        .splash-subtitle{font-size:13px;color:var(--text3);margin-bottom:36px}
        .splash-fact{font-size:12px;color:var(--text2);text-align:center;max-width:260px;line-height:1.6;min-height:36px}
        .splash-spinner{width:20px;height:20px;border:2px solid var(--border);border-top-color:var(--red);border-radius:50%;animation:spin .7s linear infinite;margin-top:18px}
        @keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.04)}}
        @keyframes spin{to{transform:rotate(360deg)}}

        /* ДЕСКТОП */
        @media (min-width:769px){
            .app{flex-direction:row}
            .chats-screen{width:360px;border-right:1px solid var(--border)}
            .chat-screen{display:flex!important}
        }

        /* МОБИЛКА */
        @media (max-width:768px){
            .header{height:54px;padding:0 14px}
            .logo-text{font-size:17px}
            .back-btn{display:flex}
            .app{height:calc(100vh - 54px);height:calc(100dvh - 54px);display:block}
            .chats-screen{max-width:100%;width:100%;height:100%;position:absolute;top:0;left:0;z-index:1}
            .chat-screen{width:100%;height:100%;position:absolute;top:0;left:0;z-index:2;background:var(--bg);transform:translateX(100%);transition:transform .3s ease}
            .chat-screen.active{transform:translateX(0)}
            .chats-screen.hidden{transform:translateX(-30%);opacity:.5;pointer-events:none}
            .msg-bubble{max-width:80%}
        }

        /* ПОЛЕ ВВОДА */
.input-area{
    padding:10px 16px;
    background:var(--bg2);
    border-top:1px solid var(--border);
    display:flex;
    align-items:flex-end;
    gap:10px;
    flex-shrink:0;
    max-height:120px;
}
.input-area textarea{
    flex:1;
    padding:10px 14px;
    background:var(--bg);
    border:1px solid var(--border);
    border-radius:18px;
    font-family:var(--font);
    font-size:14px;
    color:var(--text);
    outline:none;
    resize:none;
    min-height:40px;
    max-height:100px;
    line-height:1.4;
    transition:border-color var(--transition);
    letter-spacing:-0.01em;
}
.input-area textarea::placeholder{color:var(--text3)}
.input-area textarea:focus{border-color:var(--red)}
.send-btn{
    width:40px;height:40px;
    background:var(--red);
    color:#fff;
    border-radius:50%;
    display:flex;align-items:center;justify-content:center;
    flex-shrink:0;
    font-family:monospace;font-size:16px;
    margin-bottom:0;
}
.send-btn:hover{background:var(--red2)}
        
    </style>
</head>
<body>
    <div class="splash-screen" id="splashScreen">
        <img src="you_know.png" alt="Touch" class="splash-logo">
        <div class="splash-title">TOUCH</div>
        <div class="splash-subtitle">powered by Zmee</div>
        <div class="splash-fact" id="splashFact">Загрузка...</div>
        <div class="splash-spinner"></div>
    </div>

    <header class="header">
        <div class="header-left">
            <button class="back-btn" id="backBtn" onclick="goBack()">←</button>
            <img src="you_know.png" alt="Logo" style="width:28px;height:28px;border-radius:6px">
            <span class="logo-text">Touch (powered by Zmee)</span>
        </div>
        <div class="header-right">
            <button class="hbtn" onclick="openProfile()"><div class="ava-sm" id="headAva">?</div></button>
        </div>
    </header>

    <div class="app">
        <div class="chats-screen" id="chatsScreen">
            <div class="search-wrap">
                <div class="search-box">
                    <svg width="16" height="16" viewBox="0 0 16 16"><circle cx="7" cy="7" r="4" stroke="#999" stroke-width="1.5" fill="none"/><path d="M10.5 10.5L14 14" stroke="#999" stroke-width="1.5" stroke-linecap="round"/></svg>
                    <input type="text" placeholder="Поиск" id="searchInput">
                </div>
            </div>
            <button class="new-chat-btn" onclick="createChat()">+ Новый чат</button>
            <div class="chats-list" id="chatsList"></div>
        </div>

        <div class="chat-screen" id="chatScreen">
            <div class="chat-header">
                <div class="chat-header-info">
                    <div class="ava-lg" id="chatAva">?</div>
                    <div class="chat-header-text">
                        <div class="chat-title" id="chatTitle" onclick="renameChat()">Выберите чат</div>
                        <div class="chat-status"><span class="status-dot"></span> В сети</div>
                    </div>
                </div>
                <div class="chat-actions">
                    <button class="hbtn" onclick="renameChat()" title="Переименовать" style="font-family:monospace">/</button>
                    <button class="hbtn" onclick="deleteChat()" title="Удалить чат" style="color:var(--red);font-family:monospace">x</button>
                </div>
            </div>
            <div class="messages" id="messages"><div class="messages-center">Выберите чат для начала общения</div></div>
            <div class="input-area">
         <div class="input-area">
    <textarea id="msgInput" placeholder="Сообщение..." rows="1" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMsg()}"></textarea>
    <button class="send-btn" onclick="sendMsg()">&gt;</button>
</div>
    </div>

    <div class="modal" id="authModal">
        <div class="modal-content">
            <h2 id="authTitle">Вход в Touch</h2>
            <div class="modal-error" id="authError"></div>
            <input type="email" class="modal-input" id="authEmail" placeholder="Email">
            <input type="text" class="modal-input" id="authUsername" placeholder="Имя пользователя">
            <input type="password" class="modal-input" id="authPassword" placeholder="Пароль (если установлен)" style="display:none">
            <button class="modal-btn" id="authSubmitBtn">Войти</button>
            <p class="modal-switch"><span id="authToggleBtn">Нет аккаунта? Зарегистрироваться</span></p>
        </div>
    </div>

    <div class="modal" id="profileModal">
        <div class="modal-content" style="text-align:center">
            <span class="modal-close" onclick="closeProfile()">[x]</span>
            <div class="prof-ava" id="profAva">U</div>
            <h2 id="profName" style="font-family:var(--head);cursor:pointer" onclick="updateDisplayName()" title="Нажмите чтобы изменить имя">Пользователь</h2>
            <div class="prof-tid">TID: <span id="profTid" style="color:var(--red);font-weight:600">@touch_user</span> <button onclick="copyTid()" style="color:var(--text2);font-family:monospace;font-size:12px">[ ]</button></div>
            <div class="prof-row"><span class="lbl">Email</span><span id="profEmail">-</span></div>
            <div class="prof-row"><span class="lbl">Пароль</span><span id="passwordStatus" style="cursor:pointer;font-size:12px" onclick="setPassword()" title="Нажмите чтобы изменить пароль">[!] Не установлен</span></div>
            <div class="prof-row"><span class="lbl">Регистрация</span><span id="profDate">-</span></div>
            <button class="logout-btn" onclick="logout()">Выйти из аккаунта</button>
        </div>
    </div>

    <script>
    const SUPABASE_URL = 'https://efsacictumespelzheaj.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_10rKA_3PcyCW7l-HwSjz4w_w8NaA7ls';
    const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let user = null;
    let chatId = null;
    let isLogin = true;
    let pollTimer = null;
    let chatsPollTimer = null;
    let lastMsgCount = 0;

    function hideSplash() {
        const splash = document.getElementById('splashScreen');
        if (splash && !splash.classList.contains('hide')) {
            splash.classList.add('hide');
            setTimeout(() => { if (splash.parentNode) splash.remove(); }, 400);
        }
    }

    const saved = localStorage.getItem('touchUser');
    if (saved) {
        user = JSON.parse(saved);
        hideModal('authModal');
        refreshUI();
        loadChats();
        startChatsPolling();
        setTimeout(hideSplash, 400);
    } else {
        showModal('authModal');
        setTimeout(hideSplash, 1500);
    }

    function showModal(id) { document.getElementById(id).classList.add('show'); }
    function hideModal(id) { document.getElementById(id).classList.remove('show'); }
    document.getElementById('authModal').addEventListener('click', e => { if (e.target.id === 'authModal') hideModal('authModal'); });
    document.getElementById('profileModal').addEventListener('click', e => { if (e.target.id === 'profileModal') hideModal('profileModal'); });
    function openProfile() { refreshUI(); showModal('profileModal'); }
    function closeProfile() { hideModal('profileModal'); }

    function refreshUI() {
        if (!user) return;
        const n = user.display_name || user.username || '?';
        document.getElementById('headAva').textContent = n[0].toUpperCase();
        document.getElementById('profAva').textContent = n[0].toUpperCase();
        document.getElementById('profName').textContent = n;
        document.getElementById('profEmail').textContent = user.email || '-';
        document.getElementById('profTid').textContent = user.tid || '@touch_user';
        document.getElementById('profDate').textContent = user.created_at ? new Date(user.created_at).toLocaleDateString('ru-RU') : 'Сегодня';
        const ps = document.getElementById('passwordStatus');
        if (ps) {
            ps.textContent = user.password_hash ? '[x] Установлен' : '[!] Не установлен';
            ps.style.color = user.password_hash ? '#4CAF50' : 'var(--red)';
        }
    }

    async function setPassword() {
        if (!user) return;
        const cur = user.password_hash ? prompt('Текущий пароль:') : '';
        const np = prompt('Новый пароль (мин. 6 символов):');
        if (!np || np.length < 6) { alert('Минимум 6 символов'); return; }
        if (user.password_hash) {
            const { data: ok } = await db.rpc('check_password', { user_id: user.id, input_password: cur || '' });
            if (!ok) { alert('Неверный текущий пароль'); return; }
        }
        await db.rpc('set_user_password', { user_id: user.id, new_password: np });
        user.password_hash = '***';
        localStorage.setItem('touchUser', JSON.stringify(user));
        refreshUI();
        alert('[OK] Пароль сохранен');
    }

    async function doAuth() {
        const email = document.getElementById('authEmail').value.trim();
        const username = document.getElementById('authUsername').value.trim();
        const password = document.getElementById('authPassword')?.value || '';
        const err = document.getElementById('authError');
        err.style.display = 'none';
        if (!email || !username) { err.textContent = 'Заполните поля'; err.style.display = 'block'; return; }
        try {
            if (isLogin) {
                const { data, error } = await db.from('users').select('*').eq('email', email).eq('username', username).single();
                if (error || !data) { err.textContent = 'Не найдено'; err.style.display = 'block'; return; }
                if (data.password_hash) {
                    if (!password) { document.getElementById('authPassword').style.display = 'block'; err.textContent = 'Введите пароль'; err.style.display = 'block'; return; }
                    const { data: ok } = await db.rpc('check_password', { user_id: data.id, input_password: password });
                    if (!ok) { err.textContent = 'Неверный пароль'; err.style.display = 'block'; return; }
                }
                user = data;
                await db.from('users').update({ status: 'online', last_seen: new Date() }).eq('id', user.id);
            } else {
                const { data: ex } = await db.from('users').select('id').or(`email.eq.${email},username.eq.${username}`).maybeSingle();
                if (ex) { err.textContent = 'Уже существует'; err.style.display = 'block'; return; }
                const { data: nu, error } = await db.from('users').insert({ email, username, display_name: username, status: 'online', password_hash: password || null }).select().single();
                if (error) throw error;
                user = nu;
            }
            localStorage.setItem('touchUser', JSON.stringify(user));
            hideModal('authModal'); hideSplash();
            refreshUI(); loadChats(); startChatsPolling();
        } catch(e) { err.textContent = e.message; err.style.display = 'block'; }
    }

    document.getElementById('authSubmitBtn').addEventListener('click', doAuth);
    document.getElementById('authToggleBtn').addEventListener('click', function() {
        isLogin = !isLogin;
        document.getElementById('authTitle').textContent = isLogin ? 'Вход в Touch' : 'Регистрация';
        document.getElementById('authSubmitBtn').textContent = isLogin ? 'Войти' : 'Зарегистрироваться';
        this.textContent = isLogin ? 'Нет аккаунта? Зарегистрироваться' : 'Есть аккаунт? Войти';
        document.getElementById('authPassword').style.display = 'none';
    });

    function startChatsPolling() { if (chatsPollTimer) clearInterval(chatsPollTimer); chatsPollTimer = setInterval(updateChatsBadges, 2000); }

    async function updateChatsBadges() {
        if (!user) return;
        try {
            const { data } = await db.from('chat_members').select('chat_id, chats(id, name)').eq('user_id', user.id);
            if (!data) return;
            for (const item of data) {
                const { data: count } = await db.rpc('get_unread_count', { chat_id: item.chats.id, user_id: user.id });
                const unread = count || 0;
                const badge = document.getElementById('badge-' + item.chats.id);
                const lastMsg = document.getElementById('last-' + item.chats.id);
                if (badge) { badge.textContent = unread; badge.style.display = unread > 0 ? 'inline-block' : 'none'; }
                if (lastMsg) { lastMsg.textContent = unread > 0 ? unread + ' новых' : ''; lastMsg.style.color = unread > 0 ? 'var(--red)' : 'var(--text2)'; lastMsg.style.fontWeight = unread > 0 ? '600' : '400'; }
            }
        } catch(e) {}
    }

    async function loadChats() {
        if (!user) return;
        const { data } = await db.from('chat_members').select('chat_id, chats(id, name)').eq('user_id', user.id);
        const list = document.getElementById('chatsList');
        if (data && data.length) {
            let html = '';
            for (const item of data) {
                const isActive = chatId === item.chats.id;
                html += `<div class="chat-item${isActive?' active':''}" onclick="openChat('${item.chats.id}','${item.chats.name.replace(/'/g,"\\'")}')"><div class="ava">${(item.chats.name||'?')[0]}</div><div class="chat-info"><div class="chat-name">${item.chats.name}</div><div class="chat-last" id="last-${item.chats.id}"></div></div><div class="unread-badge" id="badge-${item.chats.id}" style="display:none">0</div></div>`;
            }
            list.innerHTML = html;
            updateChatsBadges();
        } else {
            list.innerHTML = '<div style="text-align:center;color:var(--text2);padding:30px">Нет чатов</div>';
        }
        hideSplash();
    }

    async function openChat(id, name) {
        if (pollTimer) clearInterval(pollTimer);
        chatId = id; lastMsgCount = 0;
        document.getElementById('chatTitle').textContent = name;
        document.getElementById('chatAva').textContent = name[0];
        await loadMessages();
        markAsRead(id);
        updateChatsBadges();
        pollTimer = setInterval(checkNewMessages, 1000);
        if (window.innerWidth <= 768) {
            document.getElementById('chatScreen').classList.add('active');
            document.getElementById('chatsScreen').classList.add('hidden');
            document.getElementById('backBtn').style.display = 'flex';
        }
    }

    async function loadMessages() {
        if (!chatId) return;
        const { data: msgs } = await db.from('messages').select('*').eq('chat_id', chatId).order('created_at', { ascending: true });
        const container = document.getElementById('messages');
        container.innerHTML = '';
        if (msgs && msgs.length) { lastMsgCount = msgs.length; for (const m of msgs) appendMessage(m, container); }
        else { container.innerHTML = '<div class="messages-center">Нет сообщений</div>'; }
        container.scrollTop = container.scrollHeight;
    }

async function checkNewMessages() {
    if (!chatId) return;
    const { data: msgs } = await db.from('messages').select('*').eq('chat_id', chatId).order('created_at', { ascending: true });
    if (!msgs || msgs.length <= lastMsgCount) return;
    
    const container = document.getElementById('messages');
    
    // Удаляем временные сообщения (отправляющиеся)
    const tempMsgs = container.querySelectorAll('.msg[data-msg-id^="temp_"]');
    tempMsgs.forEach(el => el.remove());
    
    // Добавляем все сообщения заново
    container.innerHTML = '';
    if (msgs && msgs.length) {
        lastMsgCount = msgs.length;
        for (const m of msgs) appendMessage(m, container);
    } else {
        container.innerHTML = '<div class="messages-center">Нет сообщений</div>';
    }
    
    container.scrollTop = container.scrollHeight;
    markAsRead(chatId);
}

    function appendMessage(m, container) {
        const isOut = m.sender_id === user.id;
        const isDel = m.is_deleted;
        const time = new Date(m.created_at).toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' });
        const div = document.createElement('div');
        div.className = 'msg ' + (isOut ? 'out' : 'in');
        div.dataset.msgId = m.id;
        div.innerHTML = `<div class="msg-bubble${isDel?' deleted':''}"><p>${isDel?'[x] Удалено':m.content}</p><div class="time">${time}</div></div>`;
        div.addEventListener('contextmenu', e => { e.preventDefault(); if (m.sender_id === user.id) showMsgMenu(e.clientX, e.clientY, m.id); });
        let lp;
        div.addEventListener('touchstart', e => { lp = setTimeout(() => { if (m.sender_id === user.id) showMsgMenu(e.touches[0].clientX, e.touches[0].clientY, m.id); }, 500); });
        div.addEventListener('touchend', () => clearTimeout(lp));
        div.addEventListener('touchmove', () => clearTimeout(lp));
        container.appendChild(div);
    }

    function showMsgMenu(x, y, id) {
        closeMsgMenu();
        const m = document.createElement('div');
        m.id = 'msgMenu';
        m.style.cssText = `position:fixed;left:${x}px;top:${y}px;background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:4px 0;z-index:300;min-width:140px;box-shadow:0 4px 16px rgba(0,0,0,.1);`;
        m.innerHTML = `<button onclick="deleteMessage('${id}')" style="width:100%;padding:8px 14px;text-align:left;font-size:13px;color:var(--red)">[x] Удалить</button><button onclick="closeMsgMenu()" style="width:100%;padding:8px 14px;text-align:left;font-size:12px;color:var(--text2)">[-] Отмена</button>`;
        document.body.appendChild(m);
        setTimeout(() => { document.addEventListener('click', closeMsgMenu); document.addEventListener('touchstart', closeMsgMenu); }, 100);
    }

    function closeMsgMenu() {
        const m = document.getElementById('msgMenu');
        if (m) m.remove();
        document.removeEventListener('click', closeMsgMenu);
        document.removeEventListener('touchstart', closeMsgMenu);
    }

    async function deleteMessage(id) {
        closeMsgMenu();
        if (!confirm('Удалить?')) return;
        await db.from('messages').update({ is_deleted: true, content: '[x] Удалено' }).eq('id', id);
        const el = document.querySelector(`[data-msg-id="${id}"]`);
        if (el) { el.querySelector('.msg-bubble').classList.add('deleted'); el.querySelector('p').textContent = '[x] Удалено'; }
    }

    async function markAsRead(cid) {
        if (!user || !cid) return;
        const { data: ur } = await db.from('messages').select('id').eq('chat_id', cid).neq('sender_id', user.id);
        if (!ur || !ur.length) return;
        await db.from('message_reads').upsert(ur.map(m => ({ message_id: m.id, user_id: user.id, read_at: new Date().toISOString() })), { onConflict: 'message_id,user_id', ignoreDuplicates: true });
    }

// ============ ОТПРАВКА С СТАТУСОМ ============
async function sendMsg() {
    if (!chatId) return;
    const textarea = document.getElementById('msgInput');
    const t = textarea.value.trim();
    if (!t) return;
    
    // Очищаем поле
    textarea.value = '';
    textarea.style.height = 'auto';
    
    // Создаем временное сообщение
    const tempId = 'temp_' + Date.now();
    const tempMsg = {
        id: tempId,
        content: t,
        sender_id: user.id,
        created_at: new Date().toISOString(),
        is_deleted: false,
        sending: true
    };
    
    // Добавляем на экран
    const container = document.getElementById('messages');
    const placeholder = container.querySelector('.messages-center');
    if (placeholder) placeholder.remove();
    appendMessage(tempMsg, container, true);
    container.scrollTop = container.scrollHeight;
    
    // Отправляем в БД
    const { error } = await db.from('messages').insert({
        chat_id: chatId,
        sender_id: user.id,
        content: t
    });
    
    if (error) {
        // Ошибка - отмечаем сообщение
        const el = document.querySelector(`[data-msg-id="${tempId}"]`);
        if (el) {
            el.querySelector('.msg-status').textContent = '[x] Ошибка';
            el.querySelector('.msg-status').style.color = 'var(--red)';
            el.querySelector('.msg-bubble').style.opacity = '0.6';
        }
        console.error('Ошибка отправки:', error);
    } else {
        // Успешно - обновляем через проверку
        await checkNewMessages();
    }
}

// ============ ОБНОВЛЕННАЯ ФУНКЦИЯ ДОБАВЛЕНИЯ СООБЩЕНИЯ ============
function appendMessage(m, container, isTemp = false) {
    const isOut = m.sender_id === user.id;
    const isDel = m.is_deleted;
    const time = new Date(m.created_at).toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' });
    
    const div = document.createElement('div');
    div.className = 'msg ' + (isOut ? 'out' : 'in');
    div.dataset.msgId = m.id;
    
    if (isDel) {
        div.innerHTML = `<div class="msg-bubble deleted"><p>[x] Удалено</p><div class="time">${time}</div></div>`;
    } else if (m.sending) {
        div.innerHTML = `
            <div class="msg-bubble" style="opacity:0.8">
                <p>${m.content}</p>
                <div class="msg-status" style="font-size:9px;color:var(--text3);text-align:right;margin-top:2px;">[~] Отправляется...</div>
                <div class="time">${time}</div>
            </div>`;
    } else {
        div.innerHTML = `<div class="msg-bubble"><p>${m.content}</p><div class="time">${time}</div></div>`;
    }
    
    // Контекстное меню только для отправленных
    if (!isTemp && !isDel) {
        div.addEventListener('contextmenu', e => { e.preventDefault(); if (m.sender_id === user.id) showMsgMenu(e.clientX, e.clientY, m.id); });
        let lp;
        div.addEventListener('touchstart', e => { lp = setTimeout(() => { if (m.sender_id === user.id) showMsgMenu(e.touches[0].clientX, e.touches[0].clientY, m.id); }, 500); });
        div.addEventListener('touchend', () => clearTimeout(lp));
        div.addEventListener('touchmove', () => clearTimeout(lp));
    }
    
    container.appendChild(div);
}

    async function createChat() {
        const q = prompt('Введите имя, email или TID:');
        if (!q) return;
        const { data: f } = await db.from('users').select('*').or(`username.eq.${q},display_name.eq.${q},tid.eq.${q},email.eq.${q}`).maybeSingle();
        if (!f) { alert('Не найден'); return; }
        if (f.id === user.id) { alert('Нельзя с собой'); return; }
        if (!confirm('Найден: ' + (f.display_name || f.username) + '\nСоздать чат?')) return;
        const { data: cid } = await db.rpc('get_or_create_chat', { user1: user.id, user2: f.id, chat_name: (user.display_name || user.username) + ' & ' + (f.display_name || f.username) });
        loadChats();
        openChat(cid, (user.display_name || user.username) + ' & ' + (f.display_name || f.username));
    }

    async function updateDisplayName() {
        const nm = prompt('Новое имя:', user.display_name || user.username);
        if (!nm) return;
        await db.from('users').update({ display_name: nm }).eq('id', user.id);
        user.display_name = nm;
        localStorage.setItem('touchUser', JSON.stringify(user));
        refreshUI();
    }

    async function renameChat() {
        if (!chatId) return;
        const nm = prompt('Название:', document.getElementById('chatTitle').textContent);
        if (!nm) return;
        await db.from('chats').update({ name: nm }).eq('id', chatId);
        document.getElementById('chatTitle').textContent = nm;
        document.getElementById('chatAva').textContent = nm[0];
        loadChats();
    }

    async function deleteChat() {
        if (!chatId) return;
        if (!confirm('Удалить чат?')) return;
        await db.from('messages').delete().eq('chat_id', chatId);
        await db.from('chat_members').delete().eq('chat_id', chatId);
        await db.from('chats').delete().eq('id', chatId);
        if (pollTimer) { clearInterval(pollTimer); pollTimer = null; }
        chatId = null;
        document.getElementById('chatTitle').textContent = 'Выберите чат';
        document.getElementById('chatAva').textContent = '?';
        document.getElementById('messages').innerHTML = '<div class="messages-center">Чат удален</div>';
        loadChats();
        if (window.innerWidth <= 768) goBack();
    }

    function goBack() {
        if (pollTimer) { clearInterval(pollTimer); pollTimer = null; }
        chatId = null; lastMsgCount = 0;
        document.getElementById('chatScreen').classList.remove('active');
        document.getElementById('chatsScreen').classList.remove('hidden');
        document.getElementById('backBtn').style.display = 'none';
        document.getElementById('chatTitle').textContent = 'Выберите чат';
        document.getElementById('chatAva').textContent = '?';
        document.getElementById('messages').innerHTML = '<div class="messages-center">Выберите чат</div>';
    }

    function copyTid() { navigator.clipboard.writeText(document.getElementById('profTid').textContent).then(() => alert('Скопировано!')); }

    function logout() {
        if (pollTimer) { clearInterval(pollTimer); pollTimer = null; }
        if (chatsPollTimer) { clearInterval(chatsPollTimer); chatsPollTimer = null; }
        if (user) db.from('users').update({ status: 'offline', last_seen: new Date() }).eq('id', user.id);
        localStorage.removeItem('touchUser');
        user = null; chatId = null;
        hideModal('profileModal'); goBack();
        document.getElementById('chatsList').innerHTML = '<div style="text-align:center;color:var(--text2);padding:30px">Нет чатов</div>';
        document.getElementById('headAva').textContent = '?';
        showModal('authModal');
    }

    document.getElementById('searchInput').addEventListener('input', function() {
        const q = this.value.toLowerCase();
        document.querySelectorAll('.chat-item').forEach(el => {
            el.style.display = el.querySelector('.chat-name').textContent.toLowerCase().includes(q) ? 'flex' : 'none';
        });
    });
        // ============ АВТО-РАСШИРЕНИЕ ПОЛЯ ВВОДА ============
document.addEventListener('DOMContentLoaded', function() {
    const textarea = document.getElementById('msgInput');
    if (textarea) {
        textarea.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = Math.min(this.scrollHeight, 100) + 'px';
        });
    }
});
