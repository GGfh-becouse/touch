<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Touch Messenger</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        :root{--bg:#111;--bg2:#1b1b1b;--card:#232323;--border:#333;--text:#f5f5f5;--text2:#a6a6a6;--red:#e53935;--red2:#ff4d4d;--font:'Inter',sans-serif;--head:'Space Grotesk',sans-serif}
        body{font-family:var(--font);background:var(--bg);color:var(--text);height:100vh;overflow:hidden}
        button{cursor:pointer;border:none;background:none;color:inherit;font-family:inherit}
        input{font-family:inherit;background:none;border:none;color:var(--text);outline:none}
        input::placeholder{color:var(--text2)}
        ::-webkit-scrollbar{width:6px}
        ::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

        .header{height:64px;background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 24px}
        .logo{font-family:var(--head);font-size:24px;font-weight:700}
        .header-actions{display:flex;gap:8px}
        .hbtn{width:40px;height:40px;border-radius:12px;display:flex;align-items:center;justify-content:center;color:var(--text2)}
        .hbtn:hover{background:var(--card);color:var(--text)}
        .ava-sm{width:32px;height:32px;background:var(--red);border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:600;font-size:14px;color:#fff}

        .main{display:flex;height:calc(100vh - 64px)}
        .sidebar{width:320px;min-width:320px;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column}
        .search-box{padding:16px}
        .search-inner{background:var(--bg);border:1px solid var(--border);border-radius:12px;padding:10px 16px;display:flex;align-items:center;gap:8px}
        .search-inner input{flex:1;font-size:14px}
        .btn-new{margin:0 16px 8px;padding:12px;background:var(--red);color:#fff;border-radius:12px;font-weight:500;font-size:14px;display:flex;align-items:center;justify-content:center;gap:8px}
        .btn-new:hover{background:var(--red2)}
        .chat-list{flex:1;overflow-y:auto;padding:4px 8px}
        .chat-item{display:flex;align-items:center;padding:10px 12px;border-radius:16px;cursor:pointer;margin-bottom:2px;gap:12px}
        .chat-item:hover{background:var(--card)}
        .chat-item.active{background:var(--card);border:1px solid var(--border)}
        .ava{width:48px;height:48px;border-radius:50%;background:linear-gradient(135deg,#667eea,#764ba2);display:flex;align-items:center;justify-content:center;font-weight:600;font-size:18px;color:#fff}
        .chat-info{flex:1;min-width:0}
        .chat-name{font-weight:500;font-size:15px}
        .chat-last{font-size:13px;color:var(--text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

        .chat-area{flex:1;display:flex;flex-direction:column;background:var(--bg)}
        .chat-top{height:64px;padding:0 24px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);background:var(--bg2)}
        .chat-top-info{display:flex;align-items:center;gap:12px}
        .ava-lg{width:44px;height:44px;border-radius:50%;background:linear-gradient(135deg,#667eea,#764ba2);display:flex;align-items:center;justify-content:center;font-weight:600;font-size:18px;color:#fff}
        .chat-title{font-family:var(--head);font-size:16px;font-weight:600;cursor:pointer}
        .chat-title:hover{color:var(--red)}
        .chat-status{display:flex;align-items:center;gap:6px;font-size:13px;color:var(--text2)}
        .status-dot{width:8px;height:8px;border-radius:50%;background:#4CAF50}

        .msgs{flex:1;overflow-y:auto;padding:20px 24px;display:flex;flex-direction:column;gap:4px}
        .msg{display:flex;margin-bottom:4px}
        .msg.in{justify-content:flex-start}
        .msg.out{justify-content:flex-end}
        .msg-body{max-width:70%;padding:10px 16px;border-radius:16px;animation:fadeIn .3s}
        .msg.in .msg-body{background:var(--card);border-bottom-left-radius:4px}
        .msg.out .msg-body{background:var(--red);color:#fff;border-bottom-right-radius:4px}
        .msg-body p{font-size:14px;line-height:1.5;margin-bottom:4px;word-wrap:break-word}
        .msg-time{font-size:11px;color:var(--text2);text-align:right}
        .msg.out .msg-time{color:rgba(255,255,255,.7)}
        @keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

        .input-area{padding:16px 24px;background:var(--bg2);border-top:1px solid var(--border);display:flex;align-items:center;gap:12px}
        .input-area input{flex:1;padding:12px 16px;background:var(--bg);border:1px solid var(--border);border-radius:12px;font-size:14px}
        .input-area input:focus{border-color:var(--red)}
        .btn-send{width:44px;height:44px;background:var(--red);color:#fff;border-radius:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
        .btn-send:hover{background:var(--red2)}

        /* Модальные окна */
        .modal{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.8);z-index:999;align-items:center;justify-content:center}
        .modal.active{display:flex}
        .modal-box{background:var(--bg2);border-radius:16px;padding:32px;width:380px;max-width:90vw}
        .modal-box h2{font-family:var(--head);font-size:22px;text-align:center;margin-bottom:20px}
        .modal-box input{width:100%;padding:12px 16px;background:var(--bg);border:1px solid var(--border);border-radius:12px;font-size:14px;margin-bottom:12px}
        .modal-box input:focus{border-color:var(--red)}
        .modal-box .btn{width:100%;padding:12px;background:var(--red);color:#fff;border-radius:12px;font-weight:500;font-size:14px;margin-bottom:8px}
        .modal-box .btn:hover{background:var(--red2)}
        .modal-box .switch{text-align:center;color:var(--text2);font-size:14px}
        .modal-box .switch span{color:var(--red);cursor:pointer}
        .modal-box .err{color:var(--red);font-size:13px;text-align:center;margin-bottom:8px;display:none}
    </style>
</head>
<body>
    <!-- МОДАЛЬНОЕ ОКНО ВХОДА -->
    <div class="modal" id="authModal">
        <div class="modal-box">
            <h2 id="authTitle">Вход в Touch</h2>
            <div class="err" id="authError"></div>
            <input type="email" id="authEmail" placeholder="Email">
            <input type="text" id="authUsername" placeholder="Имя пользователя">
            <button class="btn" id="authSubmit">Войти</button>
            <p class="switch"><span id="authToggle">Нет аккаунта? Зарегистрироваться</span></p>
        </div>
    </div>

    <!-- МОДАЛЬНОЕ ОКНО ПРОФИЛЯ -->
    <div class="modal" id="profileModal">
        <div class="modal-box" style="text-align:center">
            <div id="profAva" style="width:80px;height:80px;border-radius:50%;background:linear-gradient(135deg,#667eea,#764ba2);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:30px;color:#fff;margin:0 auto 16px">U</div>
            <h2 id="profName" style="font-family:var(--head)">Пользователь</h2>
            <div style="background:var(--bg);border-radius:12px;padding:8px 12px;margin:12px 0;font-size:13px">
                TID: <span id="profTid" style="color:var(--red);font-weight:600">@touch_user</span>
                <button onclick="copyTid()" style="color:var(--text2);margin-left:8px">📋</button>
            </div>
            <div style="text-align:left">
                <div style="display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border)">
                    <span style="color:var(--text2);font-size:13px">Email</span>
                    <span id="profEmail" style="font-size:13px">-</span>
                </div>
                <div style="display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border)">
                    <span style="color:var(--text2);font-size:13px">Регистрация</span>
                    <span id="profDate" style="font-size:13px">-</span>
                </div>
            </div>
            <button class="btn" onclick="logout()" style="margin-top:16px;background:var(--card)">Выйти</button>
        </div>
    </div>

    <!-- ХЕДЕР -->
    <header class="header">
        <div class="logo">Touch</div>
        <div class="header-actions">
            <button class="hbtn" onclick="openProfile()"><div class="ava-sm" id="headAva">?</div></button>
        </div>
    </header>

    <div class="main">
        <!-- САЙДБАР -->
        <aside class="sidebar">
            <div class="search-box">
                <div class="search-inner">
                    <svg width="16" height="16" viewBox="0 0 16 16"><circle cx="7" cy="7" r="4" stroke="#a6a6a6" stroke-width="1.5" fill="none"/><path d="M10.5 10.5L14 14" stroke="#a6a6a6" stroke-width="1.5" stroke-linecap="round"/></svg>
                    <input type="text" placeholder="Поиск чатов">
                </div>
            </div>
            <button class="btn-new" onclick="newChat()">+ Новый чат</button>
            <div class="chat-list" id="chatList"></div>
        </aside>

        <!-- ЧАТ -->
        <main class="chat-area">
            <div class="chat-top">
                <div class="chat-top-info">
                    <div class="ava-lg" id="chatAva">?</div>
                    <div>
                        <div class="chat-title" id="chatTitle" onclick="renameChat()">Выберите чат</div>
                        <div class="chat-status"><span class="status-dot"></span> Не в сети</div>
                    </div>
                </div>
                <button class="hbtn" onclick="renameChat()" title="Переименовать">✏️</button>
            </div>
            <div class="msgs" id="msgs"><div style="text-align:center;color:var(--text2);margin-top:40px">Выберите чат</div></div>
            <div class="input-area">
                <input type="text" id="msgInput" placeholder="Сообщение..." onkeypress="if(event.key==='Enter')sendMsg()">
                <button class="btn-send" onclick="sendMsg()">➤</button>
            </div>
        </main>
    </div>

    <script>
        // КОНФИГ
        const URL = 'https://efsacictumespelzheaj.supabase.co';
        const KEY = 'ВАШ_КЛЮЧ';
        const db = window.supabase.createClient(URL, KEY);
        
        let user = null;
        let chat = null;
        let sub = null;
        let loginMode = true;

        // Загрузка при старте
        const saved = localStorage.getItem('tu');
        if (saved) {
            user = JSON.parse(saved);
            hideModal('authModal');
            refreshUI();
            loadChats();
        }

        function showModal(id) { document.getElementById(id).classList.add('active'); }
        function hideModal(id) { document.getElementById(id).classList.remove('active'); }

        // ПРОФИЛЬ
        function openProfile() {
            refreshUI();
            showModal('profileModal');
        }
        document.getElementById('profileModal').addEventListener('click', function(e) {
            if (e.target === this) hideModal('profileModal');
        });

        function refreshUI() {
            if (!user) return;
            const n = user.display_name || user.username || '?';
            document.getElementById('headAva').textContent = n[0].toUpperCase();
            document.getElementById('profAva').textContent = n[0].toUpperCase();
            document.getElementById('profName').textContent = n;
            document.getElementById('profEmail').textContent = user.email || '-';
            document.getElementById('profTid').textContent = user.tid || '@touch_user';
            document.getElementById('profDate').textContent = user.created_at ? new Date(user.created_at).toLocaleDateString('ru-RU') : '-';
        }

        // АВТОРИЗАЦИЯ
        async function doAuth() {
            const email = document.getElementById('authEmail').value.trim();
            const username = document.getElementById('authUsername').value.trim();
            const err = document.getElementById('authError');
            err.style.display = 'none';
            
            if (!email || !username) {
                err.textContent = 'Заполните поля';
                err.style.display = 'block';
                return;
            }
            
            if (loginMode) {
                const { data, error } = await db.from('users').select('*').eq('email', email).eq('username', username).single();
                if (error || !data) {
                    err.textContent = 'Не найдено';
                    err.style.display = 'block';
                    return;
                }
                user = data;
            } else {
                const { data: ex } = await db.from('users').select('id').or(`email.eq.${email},username.eq.${username}`).maybeSingle();
                if (ex) {
                    err.textContent = 'Уже существует';
                    err.style.display = 'block';
                    return;
                }
                const { data: nu, error } = await db.from('users').insert({ email, username, display_name: username, status: 'online' }).select().single();
                if (error) {
                    err.textContent = error.message;
                    err.style.display = 'block';
                    return;
                }
                user = nu;
            }
            
            localStorage.setItem('tu', JSON.stringify(user));
            hideModal('authModal');
            refreshUI();
            loadChats();
        }

        document.getElementById('authSubmit').addEventListener('click', doAuth);
        document.getElementById('authToggle').addEventListener('click', function() {
            loginMode = !loginMode;
            document.getElementById('authTitle').textContent = loginMode ? 'Вход в Touch' : 'Регистрация';
            document.getElementById('authSubmit').textContent = loginMode ? 'Войти' : 'Зарегистрироваться';
            this.textContent = loginMode ? 'Нет аккаунта? Зарегистрироваться' : 'Есть аккаунт? Войти';
        });

        // ЧАТЫ
        async function loadChats() {
            if (!user) return;
            const { data } = await db.from('chat_members').select('chat_id, chats(id, name)').eq('user_id', user.id);
            const list = document.getElementById('chatList');
            list.innerHTML = '';
            if (data && data.length) {
                data.forEach(item => {
                    const d = document.createElement('div');
                    d.className = 'chat-item';
                    if (chat === item.chats.id) d.classList.add('active');
                    d.onclick = () => openChat(item.chats.id, item.chats.name);
                    d.innerHTML = `<div class="ava">${(item.chats.name||'?')[0]}</div><div class="chat-info"><div class="chat-name">${item.chats.name}</div><div class="chat-last">Открыть</div></div>`;
                    list.appendChild(d);
                });
            } else {
                list.innerHTML = '<div style="text-align:center;color:var(--text2);padding:20px">Нет чатов</div>';
            }
        }

        async function openChat(id, name) {
            if (sub) db.removeChannel(sub);
            chat = id;
            document.getElementById('chatTitle').textContent = name;
            document.getElementById('chatAva').textContent = name[0];
            
            const { data: msgs } = await db.from('messages').select('*').eq('chat_id', id).order('created_at', { ascending: true });
            const c = document.getElementById('msgs');
            c.innerHTML = '';
            if (msgs && msgs.length) {
                msgs.forEach(m => addMsg(m));
            } else {
                c.innerHTML = '<div style="text-align:center;color:var(--text2);margin-top:40px">Нет сообщений</div>';
            }
            c.scrollTop = c.scrollHeight;
            
            sub = db.channel(`c:${id}`).on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages', filter: `chat_id=eq.${id}` }, p => addMsg(p.new)).subscribe();
            loadChats();
        }

        function addMsg(m) {
            const c = document.getElementById('msgs');
            if (c.children.length === 1 && c.children[0].style?.textAlign) c.innerHTML = '';
            const d = document.createElement('div');
            d.className = `msg ${m.sender_id === user.id ? 'out' : 'in'}`;
            d.innerHTML = `<div class="msg-body"><p>${m.content}</p><div class="msg-time">${new Date(m.created_at).toLocaleTimeString('ru-RU', {hour:'2-digit',minute:'2-digit'})}</div></div>`;
            c.appendChild(d);
            c.scrollTop = c.scrollHeight;
        }

        async function sendMsg() {
            if (!chat) return;
            const t = document.getElementById('msgInput').value.trim();
            if (!t) return;
            document.getElementById('msgInput').value = '';
            await db.from('messages').insert({ chat_id: chat, sender_id: user.id, content: t });
        }

        async function newChat() {
            const u = prompt('Имя пользователя:');
            if (!u || u === user.username) return;
            const { data: f } = await db.from('users').select('*').eq('username', u).single();
            if (!f) { alert('Не найден'); return; }
            const nm = user.display_name + ' & ' + f.display_name;
            const { data: ch } = await db.from('chats').insert({ name: nm }).select().single();
            await db.from('chat_members').insert([{ chat_id: ch.id, user_id: user.id }, { chat_id: ch.id, user_id: f.id }]);
            loadChats();
            openChat(ch.id, nm);
        }

        async function renameChat() {
            if (!chat) return;
            const nm = prompt('Название:', document.getElementById('chatTitle').textContent);
            if (!nm) return;
            await db.from('chats').update({ name: nm }).eq('id', chat);
            document.getElementById('chatTitle').textContent = nm;
            document.getElementById('chatAva').textContent = nm[0];
            loadChats();
        }

        function copyTid() {
            navigator.clipboard.writeText(document.getElementById('profTid').textContent);
            alert('Скопировано!');
        }

        function logout() {
            if (sub) { db.removeChannel(sub); sub = null; }
            if (user) db.from('users').update({ status: 'offline', last_seen: new Date() }).eq('id', user.id);
            localStorage.removeItem('tu');
            user = null; chat = null;
            hideModal('profileModal');
            document.getElementById('chatList').innerHTML = '';
            document.getElementById('msgs').innerHTML = '<div style="text-align:center;color:var(--text2);margin-top:40px">Выберите чат</div>';
            document.getElementById('chatTitle').textContent = 'Выберите чат';
            document.getElementById('chatAva').textContent = '?';
            showModal('authModal');
        }

        // Если не вошли - показываем окно входа
        if (!user) {
            showModal('authModal');
        }
    </script>
</body>
</html>
