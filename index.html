<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Touch Messenger</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
:root{
    --bg:#141414;
    --bg2:#1a1a1a;
    --card:#202020;
    --card2:#252525;
    --border:#2a2a2a;
    --border2:#333;
    --text:#ececec;
    --text2:#a0a0a0;
    --text3:#7a7a7a;
    --red:#e53935;
    --red2:#ff4d4d;
    --red3:#c62828;
    --font:'Inter',sans-serif;
    --head:'Space Grotesk',sans-serif;
    --radius:12px;
    --radius-lg:16px;
    --transition:180ms ease;
}
body{
    font-family:var(--font);
    background:var(--bg);
    color:var(--text);
    height:100vh;
    height:100dvh;
    overflow:hidden;
    -webkit-tap-highlight-color:transparent;
    -webkit-font-smoothing:antialiased;
    -moz-osx-font-smoothing:grayscale;
    letter-spacing:-0.01em;
}
button{
    cursor:pointer;
    border:none;
    background:none;
    color:inherit;
    font-family:inherit;
    font-size:inherit;
    transition:all var(--transition);
}
button:active{transform:scale(0.97)}
input{
    font-family:inherit;
    background:none;
    border:none;
    color:var(--text);
    outline:none;
    font-size:15px;
    letter-spacing:-0.01em;
}
input::placeholder{color:var(--text3)}
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:#444}

/* ХЕДЕР */
.header{
    height:60px;
    background:var(--bg2);
    border-bottom:1px solid var(--border);
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:0 20px;
    z-index:100;
    backdrop-filter:blur(10px);
}
.header-left{display:flex;align-items:center;gap:12px}
.back-btn{
    display:none;
    width:34px;height:34px;
    border-radius:var(--radius);
    align-items:center;justify-content:center;
    color:var(--text2);font-size:16px;
    transition:all var(--transition);
}
.back-btn:hover{background:var(--card);color:var(--text)}
.logo-text{
    font-family:var(--head);
    font-size:19px;
    font-weight:600;
    letter-spacing:-0.02em;
    color:var(--text);
}
.header-right{display:flex;gap:6px}
.hbtn{
    width:36px;height:36px;
    border-radius:var(--radius);
    display:flex;align-items:center;justify-content:center;
    color:var(--text2);
    transition:all var(--transition);
}
.hbtn:hover{background:var(--card);color:var(--text)}
.ava-sm{
    width:32px;height:32px;
    background:var(--red);
    border-radius:50%;
    display:flex;align-items:center;justify-content:center;
    font-weight:600;font-size:13px;color:#fff;
}

/* ОСНОВНОЙ КОНТЕЙНЕР */
.app{
    display:flex;
    height:calc(100vh - 60px);
    height:calc(100dvh - 60px);
    position:relative;
    overflow:hidden;
}

/* ЭКРАН ЧАТОВ */
.chats-screen{
    width:100%;max-width:380px;
    background:var(--bg2);
    border-right:1px solid var(--border);
    display:flex;flex-direction:column;
    flex-shrink:0;
    transition:transform .3s ease;
}
.search-wrap{padding:14px}
.search-box{
    background:var(--bg);
    border:1px solid var(--border);
    border-radius:var(--radius);
    padding:9px 14px;
    display:flex;align-items:center;
    gap:10px;
    transition:border-color var(--transition);
}
.search-box:focus-within{border-color:var(--red)}
.search-box svg{flex-shrink:0;opacity:.5}
.search-box input{flex:1;font-size:14px;background:transparent}
.new-chat-btn{
    margin:0 14px 10px;
    padding:11px;
    background:var(--red);
    color:#fff;
    border-radius:var(--radius);
    font-weight:500;font-size:14px;
    display:flex;align-items:center;justify-content:center;
    gap:6px;
    transition:all var(--transition);
    letter-spacing:-0.01em;
}
.new-chat-btn:hover{background:var(--red2)}
.chats-list{flex:1;overflow-y:auto;padding:4px 8px}
.chat-item{
    display:flex;align-items:center;
    padding:10px 12px;
    border-radius:var(--radius-lg);
    cursor:pointer;
    margin-bottom:2px;gap:12px;
    transition:all var(--transition);
}
.chat-item:hover{background:var(--card)}
.chat-item.active{background:var(--card);border:1px solid var(--border2)}
.ava{
    width:44px;height:44px;
    border-radius:50%;
    background:linear-gradient(145deg,#667eea,#764ba2);
    display:flex;align-items:center;justify-content:center;
    font-weight:600;font-size:16px;color:#fff;
    flex-shrink:0;
}
.chat-info{flex:1;min-width:0}
.chat-name{font-weight:500;font-size:14px;margin-bottom:3px;color:var(--text)}
.chat-last{
    font-size:12px;color:var(--text2);
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}

/* ЭКРАН СООБЩЕНИЙ */
.chat-screen{flex:1;display:flex;flex-direction:column;background:var(--bg);min-width:0}
.chat-header{
    height:60px;padding:0 20px;
    display:flex;align-items:center;justify-content:space-between;
    border-bottom:1px solid var(--border);
    background:var(--bg2);
    flex-shrink:0;
}
.chat-header-info{display:flex;align-items:center;gap:12px;min-width:0}
.ava-lg{
    width:40px;height:40px;
    border-radius:50%;
    background:linear-gradient(145deg,#667eea,#764ba2);
    display:flex;align-items:center;justify-content:center;
    font-weight:600;font-size:15px;color:#fff;
    flex-shrink:0;
}
.chat-header-text{min-width:0}
.chat-title{
    font-family:var(--head);
    font-size:15px;font-weight:600;
    cursor:pointer;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
    transition:color var(--transition);
}
.chat-title:hover{color:var(--red)}
.chat-status{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--text3)}
.status-dot{width:6px;height:6px;border-radius:50%;background:#4CAF50;flex-shrink:0}
.chat-actions{display:flex;gap:4px;flex-shrink:0}

/* СООБЩЕНИЯ */
.messages{flex:1;overflow-y:auto;padding:16px 20px;display:flex;flex-direction:column;gap:4px}
.messages-center{
    display:flex;align-items:center;justify-content:center;
    height:100%;color:var(--text3);font-size:13px;
    text-align:center;padding:20px;
}
.msg{display:flex;margin-bottom:3px}
.msg.in{justify-content:flex-start}
.msg.out{justify-content:flex-end}
.msg-bubble{
    max-width:68%;
    padding:10px 14px;
    border-radius:var(--radius-lg);
    animation:msgIn .25s ease;
    position:relative;
}
.msg.in .msg-bubble{
    background:var(--card);
    border-bottom-left-radius:6px;
    color:var(--text);
}
.msg.out .msg-bubble{
    background:var(--red);
    color:#fff;
    border-bottom-right-radius:6px;
}
.msg-bubble p{font-size:14px;line-height:1.45;margin-bottom:3px;word-wrap:break-word}
.msg-bubble .time{font-size:10px;opacity:.65;text-align:right;margin-top:2px}
@keyframes msgIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

/* ПОЛЕ ВВОДА */
.input-area{
    padding:12px 20px;
    background:var(--bg2);
    border-top:1px solid var(--border);
    display:flex;align-items:center;gap:10px;
    flex-shrink:0;
}
.input-area input{
    flex:1;
    padding:10px 16px;
    background:var(--bg);
    border:1px solid var(--border);
    border-radius:22px;
    font-size:14px;
    transition:border-color var(--transition);
}
.input-area input:focus{border-color:var(--red)}
.send-btn{
    width:40px;height:40px;
    background:var(--red);
    color:#fff;
    border-radius:50%;
    display:flex;align-items:center;justify-content:center;
    flex-shrink:0;
    font-family:monospace;font-size:16px;
    transition:all var(--transition);
}
.send-btn:hover{background:var(--red2)}

/* МОДАЛКИ */
.modal{
    display:none;
    position:fixed;top:0;left:0;right:0;bottom:0;
    background:rgba(0,0,0,.88);
    z-index:200;
    align-items:center;justify-content:center;
    padding:20px;
    backdrop-filter:blur(4px);
}
.modal.show{display:flex}
.modal-content{
    background:var(--bg2);
    border-radius:var(--radius-lg);
    padding:28px;
    width:100%;max-width:380px;
    position:relative;
    border:1px solid var(--border);
}
.modal-content h2{
    font-family:var(--head);
    font-size:19px;
    text-align:center;
    margin-bottom:20px;
    font-weight:600;
}
.modal-input{
    width:100%;
    padding:11px 16px;
    background:var(--bg);
    border:1px solid var(--border);
    border-radius:var(--radius);
    font-size:14px;
    margin-bottom:12px;
    transition:border-color var(--transition);
}
.modal-input:focus{border-color:var(--red)}
.modal-btn{
    width:100%;
    padding:11px;
    background:var(--red);
    color:#fff;
    border-radius:var(--radius);
    font-weight:500;font-size:14px;
    margin-bottom:10px;
    transition:all var(--transition);
}
.modal-btn:hover{background:var(--red2)}
.modal-switch{text-align:center;color:var(--text2);font-size:13px}
.modal-switch span{color:var(--red);cursor:pointer;transition:color var(--transition)}
.modal-switch span:hover{color:var(--red2)}
.modal-error{color:var(--red);font-size:12px;text-align:center;margin-bottom:10px;display:none}
.modal-close{
    position:absolute;top:10px;right:14px;
    font-size:18px;color:var(--text3);cursor:pointer;
    width:32px;height:32px;
    display:flex;align-items:center;justify-content:center;
    border-radius:50%;
    font-family:monospace;
    transition:all var(--transition);
}
.modal-close:hover{background:var(--card);color:var(--text)}

/* ПРОФИЛЬ */
.prof-ava{
    width:72px;height:72px;
    border-radius:50%;
    background:linear-gradient(145deg,#667eea,#764ba2);
    display:flex;align-items:center;justify-content:center;
    font-weight:700;font-size:26px;color:#fff;
    margin:0 auto 14px;
}
.prof-tid{
    background:var(--bg);
    border-radius:var(--radius);
    padding:9px 14px;margin:12px 0;
    font-size:13px;text-align:center;
}
.prof-row{
    display:flex;justify-content:space-between;
    padding:9px 0;
    border-bottom:1px solid var(--border);
    font-size:13px;
}
.prof-row .lbl{color:var(--text3)}
.logout-btn{
    width:100%;padding:11px;
    background:var(--card);
    color:var(--red);
    border-radius:var(--radius);
    font-weight:500;font-size:14px;
    margin-top:16px;
    transition:all var(--transition);
}
.logout-btn:hover{background:var(--red);color:#fff}

/* БЕЙДЖИ */
.unread-badge{
    background:var(--red);
    color:#fff;
    border-radius:10px;
    padding:3px 7px;
    font-size:10px;
    font-weight:700;
    flex-shrink:0;
    min-width:18px;
    text-align:center;
    line-height:1.3;
}
.msg-bubble.deleted{
    opacity:.45;
    font-style:italic;
    background:var(--card)!important;
    color:var(--text3)!important;
}
@keyframes fadeIn{from{opacity:0;transform:scale(.97)}to{opacity:1;transform:scale(1)}}

/* СПЛЕШ-СКРИН */
.splash-screen{
    position:fixed;top:0;left:0;right:0;bottom:0;
    background:var(--bg);
    display:flex;flex-direction:column;
    align-items:center;justify-content:center;
    z-index:9999;
    transition:opacity .4s ease;
}
.splash-screen.hide{opacity:0;pointer-events:none}
.splash-logo{
    width:72px;height:72px;
    border-radius:18px;
    margin-bottom:18px;
    animation:pulse 2.5s infinite;
}
.splash-title{
    font-family:var(--head);
    font-size:26px;font-weight:700;
    margin-bottom:6px;
    letter-spacing:-0.03em;
}
.splash-subtitle{font-size:13px;color:var(--text3);margin-bottom:36px}
.splash-fact{
    font-size:12px;color:var(--text2);
    text-align:center;
    max-width:260px;
    line-height:1.6;
    min-height:36px;
}
.splash-spinner{
    width:20px;height:20px;
    border:2px solid var(--border2);
    border-top-color:var(--red);
    border-radius:50%;
    animation:spin .7s linear infinite;
    margin-top:18px;
}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.04)}}
@keyframes spin{to{transform:rotate(360deg)}}

/* ДЕСКТОП */
@media (min-width:769px){
    .app{flex-direction:row}
    .chats-screen{width:360px;border-right:1px solid var(--border)}
    .chat-screen{display:flex!important}
}

/* МОБИЛКА */
@media (max-width:768px){
    .header{height:54px;padding:0 14px}
    .logo-text{font-size:17px}
    .back-btn{display:flex}
    .app{height:calc(100vh - 54px);height:calc(100dvh - 54px);display:block}
    .chats-screen{max-width:100%;width:100%;height:100%;position:absolute;top:0;left:0;z-index:1}
    .chat-screen{width:100%;height:100%;position:absolute;top:0;left:0;z-index:2;background:var(--bg);transform:translateX(100%);transition:transform .3s ease}
    .chat-screen.active{transform:translateX(0)}
    .chats-screen.hidden{transform:translateX(-30%);opacity:.5;pointer-events:none}
    .msg-bubble{max-width:78%}
}
    </style>
</head>
<body>
    <!-- ПРИВЕТСТВЕННЫЙ ЭКРАН -->
    <div class="splash-screen" id="splashScreen">
        <img src="you_know.png" alt="Touch" class="splash-logo">
        <div class="splash-title">TOUCH</div>
        <div class="splash-subtitle">powered by Zmee</div>
        <div class="splash-fact" id="splashFact">Загрузка...</div>
        <div class="splash-spinner"></div>
    </div>

    <!-- ХЕДЕР -->
    <header class="header">
        <div class="header-left">
            <button class="back-btn" id="backBtn" onclick="goBack()">←</button>
            <img src="you_know.png" alt="Logo" style="width:28px;height:28px;border-radius:6px">
            <span class="logo-text">Touch (powered by Zmee)</span>
        </div>
        <div class="header-right">
            <button class="hbtn" onclick="openProfile()"><div class="ava-sm" id="headAva">?</div></button>
        </div>
    </header>

    <!-- ОСНОВНОЕ ПРИЛОЖЕНИЕ -->
    <div class="app">
        <div class="chats-screen" id="chatsScreen">
            <div class="search-wrap">
                <div class="search-box">
                    <svg width="16" height="16" viewBox="0 0 16 16"><circle cx="7" cy="7" r="4" stroke="#a6a6a6" stroke-width="1.5" fill="none"/><path d="M10.5 10.5L14 14" stroke="#a6a6a6" stroke-width="1.5" stroke-linecap="round"/></svg>
                    <input type="text" placeholder="Поиск" id="searchInput">
                </div>
            </div>
            <button class="new-chat-btn" onclick="createChat()">+ Новый чат</button>
            <div class="chats-list" id="chatsList"></div>
        </div>

        <div class="chat-screen" id="chatScreen">
            <div class="chat-header">
                <div class="chat-header-info">
                    <div class="ava-lg" id="chatAva">?</div>
                    <div class="chat-header-text">
                        <div class="chat-title" id="chatTitle" onclick="renameChat()">Выберите чат</div>
                        <div class="chat-status"><span class="status-dot"></span> зеленый кружочек</div>
                    </div>
                </div>
                <div class="chat-actions">
                    <button class="hbtn" onclick="renameChat()" title="Переименовать" style="font-family:monospace">/</button>
                    <button class="hbtn" onclick="deleteChat()" title="Удалить чат" style="color:var(--red);font-family:monospace">x</button>
                </div>
            </div>
            <div class="messages" id="messages"><div class="messages-center">Выберите чат для начала общения</div></div>
            <div class="input-area">
                <input type="text" id="msgInput" placeholder="Сообщение..." onkeydown="if(event.key==='Enter')sendMsg()">
                <button class="send-btn" onclick="sendMsg()">&gt;</button>
            </div>
        </div>
    </div>
<!-- МОДАЛКА ВХОДА -->
<div class="modal" id="authModal">
    <div class="modal-content">
        <h2 id="authTitle">Вход в Touch</h2>
        <div class="modal-error" id="authError"></div>
        <input type="email" class="modal-input" id="authEmail" placeholder="Email">
        <input type="text" class="modal-input" id="authUsername" placeholder="Имя пользователя">
        <button class="modal-btn" id="authSubmitBtn">Войти</button>
        <p class="modal-switch"><span id="authToggleBtn">Нет аккаунта? Зарегистрироваться</span></p>
    </div>
</div>

<!-- МОДАЛКА ПРОФИЛЯ -->
<div class="modal" id="profileModal">
    <div class="modal-content" style="text-align:center">
        <span class="modal-close" onclick="closeProfile()">[x]</span>
        <div class="prof-ava" id="profAva">U</div>
        <h2 id="profName" style="font-family:var(--head);cursor:pointer" onclick="updateDisplayName()" title="Нажмите чтобы изменить имя">Пользователь</h2>
        <div class="prof-tid">TID: <span id="profTid" style="color:var(--red);font-weight:600">@touch_user</span> <button onclick="copyTid()" style="color:var(--text2);font-family:monospace;font-size:12px">[ ]</button></div>
        <div class="prof-row"><span class="lbl">Email</span><span id="profEmail">-</span></div>
        <div class="prof-row"><span class="lbl">Регистрация</span><span id="profDate">-</span></div>
        <button class="logout-btn" onclick="logout()">Выйти из аккаунта</button>
    </div>
</div>
    </script>
</body>
</html>
