<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Touch Messenger</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        :root{--bg:#111;--bg2:#1b1b1b;--card:#232323;--border:#333;--text:#f5f5f5;--text2:#a6a6a6;--red:#e53935;--red2:#ff4d4d;--font:'Inter',sans-serif;--head:'Space Grotesk',sans-serif}
        body{font-family:var(--font);background:var(--bg);color:var(--text);height:100vh;height:100dvh;overflow:hidden;-webkit-tap-highlight-color:transparent}
        button{cursor:pointer;border:none;background:none;color:inherit;font-family:inherit;font-size:inherit}
        input{font-family:inherit;background:none;border:none;color:var(--text);outline:none;font-size:16px}
        input::placeholder{color:var(--text2)}
        ::-webkit-scrollbar{width:4px}
        ::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}

        /* ХЕДЕР */
        .header{height:56px;background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 12px;z-index:100}
        .header-left{display:flex;align-items:center;gap:8px}
        .back-btn{display:none;width:32px;height:32px;border-radius:8px;align-items:center;justify-content:center;color:var(--text2);font-size:18px;transition:all .15s}
        .back-btn:hover{background:var(--card);color:var(--text)}
        .logo-text{font-family:var(--head);font-size:20px;font-weight:700}
        .header-right{display:flex;gap:4px}
        .hbtn{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;color:var(--text2);transition:all .15s}
        .hbtn:hover{background:var(--card);color:var(--text)}
        .ava-sm{width:30px;height:30px;background:var(--red);border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:600;font-size:13px;color:#fff}

        /* ОСНОВНОЙ КОНТЕЙНЕР */
        .app{display:flex;height:calc(100vh - 56px);height:calc(100dvh - 56px);position:relative;overflow:hidden}

        /* ЭКРАН ЧАТОВ */
        .chats-screen{width:100%;max-width:400px;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;transition:transform .3s ease}
        .search-wrap{padding:10px}
        .search-box{background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:8px 12px;display:flex;align-items:center;gap:8px}
        .search-box svg{flex-shrink:0}
        .search-box input{flex:1;font-size:14px;background:transparent}
        .new-chat-btn{margin:0 10px 6px;padding:10px;background:var(--red);color:#fff;border-radius:10px;font-weight:500;font-size:14px;display:flex;align-items:center;justify-content:center;gap:6px;transition:all .15s}
        .new-chat-btn:active{background:var(--red2)}
        .chats-list{flex:1;overflow-y:auto;padding:2px 6px}
        .chat-item{display:flex;align-items:center;padding:10px;border-radius:14px;cursor:pointer;margin-bottom:1px;gap:10px;transition:all .15s}
        .chat-item:active{background:var(--card)}
        .chat-item.active{background:var(--card);border:1px solid var(--border)}
        .ava{width:46px;height:46px;border-radius:50%;background:linear-gradient(135deg,#667eea,#764ba2);display:flex;align-items:center;justify-content:center;font-weight:600;font-size:17px;color:#fff;flex-shrink:0}
        .chat-info{flex:1;min-width:0}
        .chat-name{font-weight:500;font-size:15px;margin-bottom:2px}
        .chat-last{font-size:12px;color:var(--text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

        /* ЭКРАН СООБЩЕНИЙ */
        .chat-screen{flex:1;display:flex;flex-direction:column;background:var(--bg);min-width:0}
        .chat-header{height:56px;padding:0 12px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);background:var(--bg2);flex-shrink:0}
        .chat-header-info{display:flex;align-items:center;gap:10px;min-width:0}
        .ava-lg{width:40px;height:40px;border-radius:50%;background:linear-gradient(135deg,#667eea,#764ba2);display:flex;align-items:center;justify-content:center;font-weight:600;font-size:16px;color:#fff;flex-shrink:0}
        .chat-header-text{min-width:0}
        .chat-title{font-family:var(--head);font-size:15px;font-weight:600;cursor:pointer;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
        .chat-title:active{color:var(--red)}
        .chat-status{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--text2)}
        .status-dot{width:6px;height:6px;border-radius:50%;background:#4CAF50;flex-shrink:0}
        .chat-actions{display:flex;gap:2px;flex-shrink:0}

        /* СООБЩЕНИЯ */
        .messages{flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:3px}
        .messages-center{display:flex;align-items:center;justify-content:center;height:100%;color:var(--text2);font-size:14px;text-align:center;padding:20px}
        .msg{display:flex;margin-bottom:2px}
        .msg.in{justify-content:flex-start}
        .msg.out{justify-content:flex-end}
        .msg-bubble{max-width:80%;padding:8px 12px;border-radius:14px;animation:msgIn .25s ease}
        .msg.in .msg-bubble{background:var(--card);border-bottom-left-radius:4px}
        .msg.out .msg-bubble{background:var(--red);color:#fff;border-bottom-right-radius:4px}
        .msg-bubble p{font-size:14px;line-height:1.4;margin-bottom:2px;word-wrap:break-word}
        .msg-bubble .time{font-size:10px;opacity:.7;text-align:right}
        @keyframes msgIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

        /* ПОЛЕ ВВОДА */
        .input-area{padding:10px 12px;background:var(--bg2);border-top:1px solid var(--border);display:flex;align-items:center;gap:8px;flex-shrink:0}
        .input-area input{flex:1;padding:10px 14px;background:var(--bg);border:1px solid var(--border);border-radius:20px;font-size:14px;transition:border-color .15s}
        .input-area input:focus{border-color:var(--red)}
        .send-btn{width:38px;height:38px;background:var(--red);color:#fff;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:16px;transition:all .15s}
        .send-btn:active{background:var(--red2);transform:scale(.95)}

        /* МОДАЛКИ */
        .modal{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.85);z-index:200;align-items:center;justify-content:center;padding:20px}
        .modal.show{display:flex}
        .modal-content{background:var(--bg2);border-radius:16px;padding:24px;width:100%;max-width:360px;position:relative}
        .modal-content h2{font-family:var(--head);font-size:20px;text-align:center;margin-bottom:16px}
        .modal-input{width:100%;padding:10px 14px;background:var(--bg);border:1px solid var(--border);border-radius:10px;font-size:14px;margin-bottom:10px;transition:border-color .15s}
        .modal-input:focus{border-color:var(--red)}
        .modal-btn{width:100%;padding:11px;background:var(--red);color:#fff;border-radius:10px;font-weight:500;font-size:14px;margin-bottom:8px;transition:all .15s}
        .modal-btn:active{background:var(--red2)}
        .modal-switch{text-align:center;color:var(--text2);font-size:13px}
        .modal-switch span{color:var(--red);cursor:pointer}
        .modal-error{color:var(--red);font-size:12px;text-align:center;margin-bottom:8px;display:none}
        .modal-close{position:absolute;top:8px;right:12px;font-size:22px;color:var(--text2);cursor:pointer;width:32px;height:32px;display:flex;align-items:center;justify-content:center;border-radius:50%}
        .modal-close:active{background:var(--card)}
        .prof-ava{width:72px;height:72px;border-radius:50%;background:linear-gradient(135deg,#667eea,#764ba2);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:28px;color:#fff;margin:0 auto 12px}
        .prof-tid{background:var(--bg);border-radius:10px;padding:8px 12px;margin:10px 0;font-size:13px;text-align:center}
        .prof-row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border);font-size:13px}
        .prof-row .lbl{color:var(--text2)}
        .logout-btn{width:100%;padding:11px;background:var(--card);color:var(--red);border-radius:10px;font-weight:500;font-size:14px;margin-top:14px;transition:all .15s}
        .logout-btn:active{background:var(--red);color:#fff}

        /* ДЕСКТОП */
        @media (min-width: 769px) {
            .app{flex-direction:row}
            .chats-screen{width:340px;border-right:1px solid var(--border)}
            .chat-screen{display:flex!important}
        }

        /* МОБИЛКА */
        @media (max-width: 768px) {
            .header{height:52px;padding:0 10px}
            .logo-text{font-size:18px}
            .back-btn{display:flex}
            .app{height:calc(100vh - 52px);height:calc(100dvh - 52px);display:block}
            .chats-screen{max-width:100%;width:100%;height:100%;position:absolute;top:0;left:0;z-index:1}
            .chat-screen{width:100%;height:100%;position:absolute;top:0;left:0;z-index:2;background:var(--bg);transform:translateX(100%);transition:transform .3s ease}
            .chat-screen.active{transform:translateX(0)}
            .chats-screen.hidden{transform:translateX(-30%);opacity:.5;pointer-events:none}
        }
        .unread-badge {
    background: var(--red);
    color: #fff;
    border-radius: 12px;
    padding: 2px 7px;
    font-size: 11px;
    font-weight: 700;
    flex-shrink: 0;
    min-width: 20px;
    text-align: center;
    line-height: 1.4;
}
    </style>
</head>
<body>
    <!-- ХЕДЕР -->
    <header class="header">
        <div class="header-left">
            <button class="back-btn" id="backBtn" onclick="goBack()">←</button>
            <span class="logo-text">Touch</span>
        </div>
        <div class="header-right">
            <button class="hbtn" onclick="openProfile()"><div class="ava-sm" id="headAva">?</div></button>
        </div>
    </header>

    <!-- ОСНОВНОЕ ПРИЛОЖЕНИЕ -->
    <div class="app">
        <!-- ЭКРАН ЧАТОВ -->
        <div class="chats-screen" id="chatsScreen">
            <div class="search-wrap">
                <div class="search-box">
                    <svg width="16" height="16" viewBox="0 0 16 16"><circle cx="7" cy="7" r="4" stroke="#a6a6a6" stroke-width="1.5" fill="none"/><path d="M10.5 10.5L14 14" stroke="#a6a6a6" stroke-width="1.5" stroke-linecap="round"/></svg>
                    <input type="text" placeholder="Поиск" id="searchInput">
                </div>
            </div>
            <button class="new-chat-btn" onclick="createChat()">+ Новый чат</button>
            <div class="chats-list" id="chatsList"></div>
        </div>

        <!-- ЭКРАН СООБЩЕНИЙ -->
        <div class="chat-screen" id="chatScreen">
           <div class="chat-header">
    <div class="chat-header-info">
        <div class="ava-lg" id="chatAva">?</div>
        <div class="chat-header-text">
            <div class="chat-title" id="chatTitle" onclick="renameChat()">Выберите чат</div>
            <div class="chat-status"><span class="status-dot"></span> Не в сети</div>
        </div>
    </div>
    <div class="chat-actions">
        <button class="hbtn" onclick="renameChat()" title="Переименовать">✏️</button>
        <button class="hbtn" onclick="deleteChat()" title="Удалить чат" style="color:var(--red)">🗑️</button>
    </div>
</div>
            <div class="messages" id="messages"><div class="messages-center">Выберите чат для начала общения</div></div>
            <div class="input-area">
                <input type="text" id="msgInput" placeholder="Сообщение..." onkeydown="if(event.key==='Enter')sendMsg()">
                <button class="send-btn" onclick="sendMsg()">➤</button>
            </div>
        </div>
    </div>

    <!-- МОДАЛКА ВХОДА -->
    <div class="modal" id="authModal">
        <div class="modal-content">
            <h2 id="authTitle">Вход в Touch</h2>
            <div class="modal-error" id="authError"></div>
            <input type="email" class="modal-input" id="authEmail" placeholder="Email (@touch.com)">
            <input type="text" class="modal-input" id="authUsername" placeholder="Имя пользователя">
            <button class="modal-btn" id="authSubmitBtn">Войти</button>
            <p class="modal-switch"><span id="authToggleBtn">Нет аккаунта? Зарегистрироваться</span></p>
        </div>
    </div>

    <!-- МОДАЛКА ПРОФИЛЯ -->
    <div class="modal" id="profileModal">
        <div class="modal-content" style="text-align:center">
            <span class="modal-close" onclick="closeProfile()">×</span>
            <div class="prof-ava" id="profAva">U</div>
            <h2 id="profName">Пользователь</h2>
            <div class="prof-tid">TID: <span id="profTid" style="color:var(--red);font-weight:600">@touch_user</span> <button onclick="copyTid()" style="color:var(--text2)">📋</button></div>
            <div class="prof-row"><span class="lbl">Email</span><span id="profEmail">-</span></div>
            <div class="prof-row"><span class="lbl">Регистрация</span><span id="profDate">-</span></div>
            <button class="logout-btn" onclick="logout()">Выйти из аккаунта</button>
        </div>
    </div>
<script>
// ============ КОНФИГ ============
const SUPABASE_URL = 'https://efsacictumespelzheaj.supabase.co';
const SUPABASE_KEY = 'sb_publishable_10rKA_3PcyCW7l-HwSjz4w_w8NaA7ls';
const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// ============ СОСТОЯНИЕ ============
let user = null;
let chatId = null;
let isLogin = true;
let pollTimer = null;
let chatsPollTimer = null;
let lastMsgCount = 0;

// ============ ИНИЦИАЛИЗАЦИЯ ============
const saved = localStorage.getItem('touchUser');
if (saved) {
    user = JSON.parse(saved);
    hideModal('authModal');
    refreshUI();
    loadChats();
    startChatsPolling();
} else {
    showModal('authModal');
}

// ============ МОДАЛКИ ============
function showModal(id) { document.getElementById(id).classList.add('show'); }
function hideModal(id) { document.getElementById(id).classList.remove('show'); }
document.getElementById('authModal').addEventListener('click', e => { if (e.target.id === 'authModal') hideModal('authModal'); });
document.getElementById('profileModal').addEventListener('click', e => { if (e.target.id === 'profileModal') hideModal('profileModal'); });
function openProfile() { refreshUI(); showModal('profileModal'); }
function closeProfile() { hideModal('profileModal'); }

// ============ UI ============
function refreshUI() {
    if (!user) return;
    const n = user.display_name || user.username || '?';
    document.getElementById('headAva').textContent = n[0].toUpperCase();
    document.getElementById('profAva').textContent = n[0].toUpperCase();
    document.getElementById('profName').textContent = n;
    document.getElementById('profEmail').textContent = user.email || '-';
    document.getElementById('profTid').textContent = user.tid || '@touch_user';
    document.getElementById('profDate').textContent = user.created_at ? new Date(user.created_at).toLocaleDateString('ru-RU') : 'Сегодня';
}

// ============ АВТОРИЗАЦИЯ ============
async function doAuth() {
    const email = document.getElementById('authEmail').value.trim();
    const username = document.getElementById('authUsername').value.trim();
    const err = document.getElementById('authError');
    err.style.display = 'none';
    if (!email || !username) { err.textContent = 'Заполните поля'; err.style.display = 'block'; return; }
    try {
        if (isLogin) {
            const { data, error } = await db.from('users').select('*').eq('email', email).eq('username', username).single();
            if (error || !data) { err.textContent = 'Не найдено'; err.style.display = 'block'; return; }
            user = data;
        } else {
            const { data: ex } = await db.from('users').select('id').or(`email.eq.${email},username.eq.${username}`).maybeSingle();
            if (ex) { err.textContent = 'Уже существует'; err.style.display = 'block'; return; }
            const { data: nu, error } = await db.from('users').insert({ email, username, display_name: username, status: 'online' }).select().single();
            if (error) throw error;
            user = nu;
        }
        localStorage.setItem('touchUser', JSON.stringify(user));
        hideModal('authModal');
        refreshUI();
        loadChats();
        startChatsPolling();
    } catch(e) { err.textContent = e.message; err.style.display = 'block'; }
}

document.getElementById('authSubmitBtn').addEventListener('click', doAuth);
document.getElementById('authToggleBtn').addEventListener('click', function() {
    isLogin = !isLogin;
    document.getElementById('authTitle').textContent = isLogin ? 'Вход в Touch' : 'Регистрация';
    document.getElementById('authSubmitBtn').textContent = isLogin ? 'Войти' : 'Зарегистрироваться';
    this.textContent = isLogin ? 'Нет аккаунта? Зарегистрироваться' : 'Есть аккаунт? Войти';
});

// ============ АВТООБНОВЛЕНИЕ ЧАТОВ ============
function startChatsPolling() {
    if (chatsPollTimer) clearInterval(chatsPollTimer);
    chatsPollTimer = setInterval(updateChatsBadges, 2000); // Каждые 2 секунды
}

async function updateChatsBadges() {
    if (!user) return;
    
    try {
        const { data } = await db.from('chat_members')
            .select('chat_id, chats(id, name)')
            .eq('user_id', user.id);
        
        if (!data) return;
        
        for (const item of data) {
            const { data: count } = await db.rpc('get_unread_count', {
                chat_id: item.chats.id,
                user_id: user.id
            });
            
            const unread = count || 0;
            const badge = document.getElementById('badge-' + item.chats.id);
            const lastMsg = document.getElementById('last-' + item.chats.id);
            
            if (badge) {
                if (unread > 0) {
                    badge.textContent = unread;
                    badge.style.display = 'inline-block';
                } else {
                    badge.style.display = 'none';
                }
            }
            
            if (lastMsg && unread > 0) {
                lastMsg.textContent = unread + ' новых сообщений';
                lastMsg.style.color = 'var(--red)';
                lastMsg.style.fontWeight = '600';
            } else if (lastMsg) {
                lastMsg.textContent = 'Нет новых';
                lastMsg.style.color = 'var(--text2)';
                lastMsg.style.fontWeight = '400';
            }
        }
    } catch(e) {}
}

// ============ ЧАТЫ ============
async function loadChats() {
    if (!user) return;
    const { data } = await db.from('chat_members').select('chat_id, chats(id, name)').eq('user_id', user.id);
    const list = document.getElementById('chatsList');
    
    if (data && data.length) {
        let html = '';
        for (const item of data) {
            const isActive = chatId === item.chats.id;
            html += `
                <div class="chat-item${isActive ? ' active' : ''}" onclick="openChat('${item.chats.id}', '${item.chats.name.replace(/'/g, "\\'")}')">
                    <div class="ava">${(item.chats.name || '?')[0]}</div>
                    <div class="chat-info">
                        <div class="chat-name">${item.chats.name}</div>
                        <div class="chat-last" id="last-${item.chats.id}">Нет новых</div>
                    </div>
                    <div class="unread-badge" id="badge-${item.chats.id}" style="display:none">0</div>
                </div>
            `;
        }
        list.innerHTML = html;
        
        // Сразу обновляем бейджи
        updateChatsBadges();
    } else {
        list.innerHTML = '<div style="text-align:center;color:var(--text2);padding:30px">Нет чатов</div>';
    }
}

// ============ ОТКРЫТИЕ ЧАТА ============
async function openChat(id, name) {
    if (pollTimer) clearInterval(pollTimer);
    chatId = id;
    lastMsgCount = 0;
    
    document.getElementById('chatTitle').textContent = name;
    document.getElementById('chatAva').textContent = name[0];
    
    await loadMessages();
    markAsRead(id);
    
    // Сразу обновляем бейдж этого чата
    updateChatsBadges();
    
    pollTimer = setInterval(checkNewMessages, 1000);
    
    if (window.innerWidth <= 768) {
        document.getElementById('chatScreen').classList.add('active');
        document.getElementById('chatsScreen').classList.add('hidden');
        document.getElementById('backBtn').style.display = 'flex';
    }
}

// ============ ЗАГРУЗКА СООБЩЕНИЙ ============
async function loadMessages() {
    if (!chatId) return;
    
    const { data: msgs } = await db.from('messages')
        .select('*')
        .eq('chat_id', chatId)
        .order('created_at', { ascending: true });
    
    const container = document.getElementById('messages');
    container.innerHTML = '';
    
    if (msgs && msgs.length) {
        lastMsgCount = msgs.length;
        for (const m of msgs) {
            appendMessage(m, container);
        }
    } else {
        container.innerHTML = '<div class="messages-center">Нет сообщений</div>';
    }
    
    container.scrollTop = container.scrollHeight;
}

// ============ ПРОВЕРКА НОВЫХ СООБЩЕНИЙ ============
async function checkNewMessages() {
    if (!chatId) return;
    
    const { data: msgs } = await db.from('messages')
        .select('*')
        .eq('chat_id', chatId)
        .order('created_at', { ascending: true });
    
    if (!msgs || msgs.length <= lastMsgCount) return;
    
    const container = document.getElementById('messages');
    const placeholder = container.querySelector('.messages-center');
    if (placeholder) placeholder.remove();
    
    for (let i = lastMsgCount; i < msgs.length; i++) {
        appendMessage(msgs[i], container);
    }
    
    lastMsgCount = msgs.length;
    container.scrollTop = container.scrollHeight;
    
    markAsRead(chatId);
}

// ============ ДОБАВЛЕНИЕ СООБЩЕНИЯ ============
function appendMessage(m, container) {
    const isOutgoing = m.sender_id === user.id;
    const time = new Date(m.created_at).toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' });
    
    const div = document.createElement('div');
    div.className = 'msg ' + (isOutgoing ? 'out' : 'in');
    div.innerHTML = `
        <div class="msg-bubble">
            <p>${m.content}</p>
            <div class="time">${time}</div>
        </div>
    `;
    container.appendChild(div);
}

// ============ ОТМЕТКА ПРОЧТЕНИЯ ============
async function markAsRead(chatId) {
    if (!user || !chatId) return;
    
    const { data: unread } = await db.from('messages')
        .select('id')
        .eq('chat_id', chatId)
        .neq('sender_id', user.id);
    
    if (!unread || !unread.length) return;
    
    const reads = unread.map(msg => ({
        message_id: msg.id,
        user_id: user.id,
        read_at: new Date().toISOString()
    }));
    
    await db.from('message_reads').upsert(reads, {
        onConflict: 'message_id,user_id',
        ignoreDuplicates: true
    });
}

// ============ ОТПРАВКА ============
async function sendMsg() {
    if (!chatId) return;
    const t = document.getElementById('msgInput').value.trim();
    if (!t) return;
    document.getElementById('msgInput').value = '';
    
    await db.from('messages').insert({
        chat_id: chatId,
        sender_id: user.id,
        content: t
    });
    
    await checkNewMessages();
}

// ============ СОЗДАНИЕ ЧАТА ============
async function createChat() {
    const u = prompt('Имя пользователя:');
    if (!u || u === user.username) return;
    const { data: f } = await db.from('users').select('*').eq('username', u).single();
    if (!f) { alert('Не найден'); return; }
    
    // Проверяем существующий чат
    const { data: existing } = await db.rpc('get_or_create_chat', {
        user1: user.id,
        user2: f.id,
        chat_name: user.display_name + ' & ' + f.display_name
    });
    
    loadChats();
    openChat(existing, user.display_name + ' & ' + f.display_name);
}

// ============ ПЕРЕИМЕНОВАНИЕ ============
async function renameChat() {
    if (!chatId) return;
    const nm = prompt('Новое название:', document.getElementById('chatTitle').textContent);
    if (!nm) return;
    await db.from('chats').update({ name: nm }).eq('id', chatId);
    document.getElementById('chatTitle').textContent = nm;
    document.getElementById('chatAva').textContent = nm[0];
    loadChats();
}

// ============ УДАЛЕНИЕ ЧАТА ============
async function deleteChat() {
    if (!chatId) return;
    const name = document.getElementById('chatTitle').textContent;
    if (!confirm('Удалить чат "' + name + '"?')) return;
    
    await db.from('messages').delete().eq('chat_id', chatId);
    await db.from('chat_members').delete().eq('chat_id', chatId);
    await db.from('chats').delete().eq('id', chatId);
    
    if (pollTimer) { clearInterval(pollTimer); pollTimer = null; }
    chatId = null;
    document.getElementById('chatTitle').textContent = 'Выберите чат';
    document.getElementById('chatAva').textContent = '?';
    document.getElementById('messages').innerHTML = '<div class="messages-center">Чат удален</div>';
    loadChats();
    
    if (window.innerWidth <= 768) goBack();
}

// ============ НАВИГАЦИЯ ============
function goBack() {
    if (pollTimer) { clearInterval(pollTimer); pollTimer = null; }
    chatId = null;
    lastMsgCount = 0;
    document.getElementById('chatScreen').classList.remove('active');
    document.getElementById('chatsScreen').classList.remove('hidden');
    document.getElementById('backBtn').style.display = 'none';
    document.getElementById('chatTitle').textContent = 'Выберите чат';
    document.getElementById('chatAva').textContent = '?';
    document.getElementById('messages').innerHTML = '<div class="messages-center">Выберите чат для начала общения</div>';
}

// ============ ПРОЧЕЕ ============
function copyTid() { navigator.clipboard.writeText(document.getElementById('profTid').textContent).then(() => alert('Скопировано!')); }

function logout() {
    if (pollTimer) { clearInterval(pollTimer); pollTimer = null; }
    if (chatsPollTimer) { clearInterval(chatsPollTimer); chatsPollTimer = null; }
    if (user) db.from('users').update({ status: 'offline', last_seen: new Date() }).eq('id', user.id);
    localStorage.removeItem('touchUser');
    user = null; chatId = null;
    hideModal('profileModal');
    goBack();
    document.getElementById('chatsList').innerHTML = '<div style="text-align:center;color:var(--text2);padding:30px">Нет чатов</div>';
    document.getElementById('headAva').textContent = '?';
    showModal('authModal');
}

document.getElementById('searchInput').addEventListener('input', function() {
    const q = this.value.toLowerCase();
    document.querySelectorAll('.chat-item').forEach(el => {
        el.style.display = el.querySelector('.chat-name').textContent.toLowerCase().includes(q) ? 'flex' : 'none';
    });
});
</script>
