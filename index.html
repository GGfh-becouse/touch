<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Touch Messenger</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        :root{--bg:#111;--bg2:#1b1b1b;--card:#232323;--border:#333;--text:#f5f5f5;--text2:#a6a6a6;--red:#e53935;--red2:#ff4d4d;--font:'Inter',sans-serif;--head:'Space Grotesk',sans-serif}
        body{font-family:var(--font);background:var(--bg);color:var(--text);height:100vh;overflow:hidden}
        button{cursor:pointer;border:none;background:none;color:inherit;font-family:inherit}
        input{font-family:inherit;background:none;border:none;color:var(--text);outline:none}
        input::placeholder{color:var(--text2)}
        ::-webkit-scrollbar{width:6px}
        ::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

        .header{height:64px;background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 24px}
        .header-logo{font-family:var(--head);font-size:24px;font-weight:700;display:flex;align-items:center;gap:10px}
        .header-actions{display:flex;gap:8px}
        .hbtn{width:40px;height:40px;border-radius:12px;display:flex;align-items:center;justify-content:center;color:var(--text2);transition:all .15s}
        .hbtn:hover{background:var(--card);color:var(--text)}
        .ava-sm{width:32px;height:32px;background:var(--red);border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:600;font-size:14px;color:#fff}

        .main{display:flex;height:calc(100vh - 64px)}
        .sidebar{width:320px;min-width:320px;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column}
        .search-box{padding:16px}
        .search-inner{background:var(--bg);border:1px solid var(--border);border-radius:12px;padding:10px 16px;display:flex;align-items:center;gap:8px}
        .search-inner input{flex:1;font-size:14px}
        .btn-new{margin:0 16px 8px;padding:12px;background:var(--red);color:#fff;border-radius:12px;font-weight:500;font-size:14px;display:flex;align-items:center;justify-content:center;gap:8px;transition:all .15s}
        .btn-new:hover{background:var(--red2)}
        .chat-list{flex:1;overflow-y:auto;padding:4px 8px}
        .chat-item{display:flex;align-items:center;padding:10px 12px;border-radius:16px;cursor:pointer;margin-bottom:2px;gap:12px;transition:all .15s}
        .chat-item:hover{background:var(--card)}
        .chat-item.active{background:var(--card);border:1px solid var(--border)}
        .ava{width:48px;height:48px;border-radius:50%;background:linear-gradient(135deg,#667eea,#764ba2);display:flex;align-items:center;justify-content:center;font-weight:600;font-size:18px;color:#fff}
        .chat-info{flex:1;min-width:0}
        .chat-name{font-weight:500;font-size:15px}
        .chat-last{font-size:13px;color:var(--text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

        .chat-area{flex:1;display:flex;flex-direction:column;background:var(--bg)}
        .chat-top{height:64px;padding:0 24px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);background:var(--bg2)}
        .chat-top-info{display:flex;align-items:center;gap:12px}
        .ava-lg{width:44px;height:44px;border-radius:50%;background:linear-gradient(135deg,#667eea,#764ba2);display:flex;align-items:center;justify-content:center;font-weight:600;font-size:18px;color:#fff}
        .chat-title{font-family:var(--head);font-size:16px;font-weight:600;cursor:pointer;transition:all .15s}
        .chat-title:hover{color:var(--red)}
        .chat-status{display:flex;align-items:center;gap:6px;font-size:13px;color:var(--text2)}
        .status-dot{width:8px;height:8px;border-radius:50%;background:#4CAF50}

        .msgs{flex:1;overflow-y:auto;padding:20px 24px;display:flex;flex-direction:column;gap:4px}
        .msg{display:flex;margin-bottom:4px}
        .msg.in{justify-content:flex-start}
        .msg.out{justify-content:flex-end}
        .msg-body{max-width:70%;padding:10px 16px;border-radius:16px;animation:fadeIn .3s}
        .msg.in .msg-body{background:var(--card);border-bottom-left-radius:4px}
        .msg.out .msg-body{background:var(--red);color:#fff;border-bottom-right-radius:4px}
        .msg-body p{font-size:14px;line-height:1.5;margin-bottom:4px;word-wrap:break-word}
        .msg-time{font-size:11px;color:var(--text2);text-align:right}
        .msg.out .msg-time{color:rgba(255,255,255,.7)}
        @keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

        .input-area{padding:16px 24px;background:var(--bg2);border-top:1px solid var(--border);display:flex;align-items:center;gap:12px}
        .input-area input{flex:1;padding:12px 16px;background:var(--bg);border:1px solid var(--border);border-radius:12px;font-size:14px;transition:border-color .15s}
        .input-area input:focus{border-color:var(--red)}
        .btn-send{width:44px;height:44px;background:var(--red);color:#fff;border-radius:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:18px;transition:all .15s}
        .btn-send:hover{background:var(--red2)}

        .modal{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.85);z-index:999;align-items:center;justify-content:center}
        .modal.show{display:flex}
        .modal-box{background:var(--bg2);border-radius:16px;padding:32px;width:380px;max-width:90vw}
        .modal-box h2{font-family:var(--head);font-size:22px;text-align:center;margin-bottom:20px}
        .modal-box input{width:100%;padding:12px 16px;background:var(--bg);border:1px solid var(--border);border-radius:12px;font-size:14px;margin-bottom:12px;transition:border-color .15s}
        .modal-box input:focus{border-color:var(--red)}
        .modal-box .btn{width:100%;padding:12px;background:var(--red);color:#fff;border-radius:12px;font-weight:500;font-size:14px;margin-bottom:8px;transition:all .15s}
        .modal-box .btn:hover{background:var(--red2)}
        .modal-box .switch{text-align:center;color:var(--text2);font-size:14px}
        .modal-box .switch span{color:var(--red);cursor:pointer}
        .modal-box .err{color:var(--red);font-size:13px;text-align:center;margin-bottom:8px;display:none}
        .modal-box .close{position:absolute;top:12px;right:16px;font-size:24px;color:var(--text2);cursor:pointer;width:32px;height:32px;display:flex;align-items:center;justify-content:center;border-radius:50%}
        .modal-box .close:hover{background:var(--card);color:var(--text)}
    </style>
</head>
<body>
    <!-- ОКНО ВХОДА -->
    <div class="modal" id="authModal">
        <div class="modal-box" style="position:relative">
            <h2 id="authTitle">Вход в Touch</h2>
            <div class="err" id="authError"></div>
            <input type="email" id="authEmail" placeholder="Email">
            <input type="text" id="authUsername" placeholder="Имя пользователя">
            <button class="btn" id="authSubmitBtn">Войти</button>
            <p class="switch"><span id="authToggleBtn">Нет аккаунта? Зарегистрироваться</span></p>
        </div>
    </div>

    <!-- ОКНО ПРОФИЛЯ -->
    <div class="modal" id="profileModal">
        <div class="modal-box" style="text-align:center;position:relative">
            <span class="close" onclick="closeProfile()">&times;</span>
            <div id="profAva" style="width:80px;height:80px;border-radius:50%;background:linear-gradient(135deg,#667eea,#764ba2);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:30px;color:#fff;margin:0 auto 16px">U</div>
            <h2 id="profName" style="font-family:var(--head)">Пользователь</h2>
            <div style="background:var(--bg);border-radius:12px;padding:8px 12px;margin:12px 0;font-size:13px">
                TID: <span id="profTid" style="color:var(--red);font-weight:600">@touch_user</span>
                <button onclick="copyTid()" style="color:var(--text2);margin-left:8px;font-size:16px">📋</button>
            </div>
            <div style="text-align:left">
                <div style="display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border)">
                    <span style="color:var(--text2);font-size:13px">Email</span>
                    <span id="profEmail" style="font-size:13px">-</span>
                </div>
                <div style="display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border)">
                    <span style="color:var(--text2);font-size:13px">Регистрация</span>
                    <span id="profDate" style="font-size:13px">-</span>
                </div>
            </div>
            <button class="btn" onclick="doLogout()" style="margin-top:16px;background:var(--card)">Выйти из аккаунта</button>
        </div>
    </div>

    <!-- ХЕДЕР -->
    <header class="header">
        <div class="header-logo">
            <svg width="28" height="28" viewBox="0 0 32 32"><rect width="32" height="32" rx="8" fill="#e53935"/><circle cx="16" cy="16" r="5" fill="#fff"/></svg>
            Touch
        </div>
        <div class="header-actions">
            <button class="hbtn" onclick="openProfile()"><div class="ava-sm" id="headAva">?</div></button>
        </div>
    </header>

    <div class="main">
        <aside class="sidebar">
            <div class="search-box">
                <div class="search-inner">
                    <span style="color:var(--text2)">🔍</span>
                    <input type="text" placeholder="Поиск чатов" id="searchInput">
                </div>
            </div>
            <button class="btn-new" onclick="createNewChat()">+ Новый чат</button>
            <div class="chat-list" id="chatList"></div>
        </aside>

        <main class="chat-area">
            <div class="chat-top">
                <div class="chat-top-info">
                    <div class="ava-lg" id="chatAva">?</div>
                    <div>
                        <div class="chat-title" id="chatTitle" onclick="renameCurrentChat()">Выберите чат</div>
                        <div class="chat-status"><span class="status-dot"></span> Не в сети</div>
                    </div>
                </div>
                <button class="hbtn" onclick="renameCurrentChat()" title="Переименовать чат">✏️</button>
            </div>
            <div class="msgs" id="msgs"><div style="text-align:center;color:var(--text2);margin-top:40px">Выберите чат для начала общения</div></div>
            <div class="input-area">
                <input type="text" id="msgInput" placeholder="Напишите сообщение..." onkeydown="if(event.key==='Enter')sendMessage()">
                <button class="btn-send" onclick="sendMessage()">➤</button>
            </div>
        </main>
    </div>

    <script>
        // ============ НАСТРОЙКИ ============
        const SUPABASE_URL = 'https://efsacictumespelzheaj.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_10rKA_3PcyCW7l-HwSjz4w_w8NaA7ls';
        
        // ============ ГЛОБАЛЬНЫЕ ПЕРЕМЕННЫЕ ============
        const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        let currentUser = null;
        let activeChatId = null;
        let realtimeChannel = null;
        let isLoginMode = true;

        // ============ ИНИЦИАЛИЗАЦИЯ ============
        const savedData = localStorage.getItem('touchUser');
        if (savedData) {
            currentUser = JSON.parse(savedData);
            hideModal('authModal');
            updateAllUI();
            loadChatList();
        }

        // ============ МОДАЛЬНЫЕ ОКНА ============
        function showModal(id) { document.getElementById(id).classList.add('show'); }
        function hideModal(id) { document.getElementById(id).classList.remove('show'); }
        
        document.getElementById('profileModal').addEventListener('click', function(e) {
            if (e.target === this) hideModal('profileModal');
        });

        function openProfile() {
            updateAllUI();
            showModal('profileModal');
        }
        
        function closeProfile() {
            hideModal('profileModal');
        }

        // ============ ОБНОВЛЕНИЕ UI ============
        function updateAllUI() {
            if (!currentUser) return;
            const name = currentUser.display_name || currentUser.username || '?';
            const letter = name[0].toUpperCase();
            
            document.getElementById('headAva').textContent = letter;
            document.getElementById('profAva').textContent = letter;
            document.getElementById('profName').textContent = name;
            document.getElementById('profEmail').textContent = currentUser.email || '-';
            document.getElementById('profTid').textContent = currentUser.tid || '@touch_user';
            document.getElementById('profDate').textContent = currentUser.created_at 
                ? new Date(currentUser.created_at).toLocaleDateString('ru-RU') 
                : 'Сегодня';
        }

        // ============ АВТОРИЗАЦИЯ ============
        async function handleAuth() {
            const email = document.getElementById('authEmail').value.trim();
            const username = document.getElementById('authUsername').value.trim();
            const errDiv = document.getElementById('authError');
            
            errDiv.style.display = 'none';
            
            if (!email || !username) {
                errDiv.textContent = 'Заполните все поля';
                errDiv.style.display = 'block';
                return;
            }
            
            try {
                if (isLoginMode) {
                    const { data, error } = await db.from('users')
                        .select('*')
                        .eq('email', email)
                        .eq('username', username)
                        .single();
                    
                    if (error || !data) {
                        errDiv.textContent = 'Пользователь не найден';
                        errDiv.style.display = 'block';
                        return;
                    }
                    currentUser = data;
                } else {
                    const { data: exists } = await db.from('users')
                        .select('id')
                        .or(`email.eq.${email},username.eq.${username}`)
                        .maybeSingle();
                    
                    if (exists) {
                        errDiv.textContent = 'Пользователь уже существует';
                        errDiv.style.display = 'block';
                        return;
                    }
                    
                    const { data: newUser, error } = await db.from('users')
                        .insert({
                            email: email,
                            username: username,
                            display_name: username,
                            status: 'online'
                        })
                        .select()
                        .single();
                    
                    if (error) throw error;
                    currentUser = newUser;
                }
                
                localStorage.setItem('touchUser', JSON.stringify(currentUser));
                hideModal('authModal');
                updateAllUI();
                loadChatList();
                
            } catch (err) {
                errDiv.textContent = 'Ошибка: ' + err.message;
                errDiv.style.display = 'block';
            }
        }

        // ============ ЧАТЫ ============
        async function loadChatList() {
            if (!currentUser) return;
            
            const { data } = await db.from('chat_members')
                .select('chat_id, chats(id, name)')
                .eq('user_id', currentUser.id);
            
            const list = document.getElementById('chatList');
            list.innerHTML = '';
            
            if (data && data.length > 0) {
                data.forEach(item => {
                    const div = document.createElement('div');
                    div.className = 'chat-item';
                    if (activeChatId === item.chats.id) div.classList.add('active');
                    div.onclick = () => openChat(item.chats.id, item.chats.name);
                    div.innerHTML = `
                        <div class="ava">${(item.chats.name || '?')[0]}</div>
                        <div class="chat-info">
                            <div class="chat-name">${item.chats.name}</div>
                            <div class="chat-last">Нажмите чтобы открыть</div>
                        </div>
                    `;
                    list.appendChild(div);
                });
            } else {
                list.innerHTML = '<div style="text-align:center;color:var(--text2);padding:20px">Нет чатов</div>';
            }
        }

       let pollingInterval = null;

async function openChat(chatId, chatName) {
    // Останавливаем старые подписки
    if (realtimeChannel) db.removeChannel(realtimeChannel);
    if (pollingInterval) clearInterval(pollingInterval);
    
    activeChatId = chatId;
    document.getElementById('chatTitle').textContent = chatName;
    document.getElementById('chatAva').textContent = chatName[0];
    
    // Первая загрузка сообщений
    await loadMessagesForChat(chatId);
    
    // Способ 1: Realtime через WebSocket (мгновенно)
    realtimeChannel = db.channel('chat:' + chatId)
        .on('postgres_changes', {
            event: 'INSERT',
            schema: 'public',
            table: 'messages',
            filter: 'chat_id=eq.' + chatId
        }, (payload) => {
            addMessageToChat(payload.new);
        })
        .subscribe();
    
    // Способ 2: Polling каждую 1 секунду (резервный)
    pollingInterval = setInterval(async () => {
        await loadMessagesForChat(chatId, true);
    }, 1000);
    
    loadChatList();
}

// Новая функция загрузки сообщений
async function loadMessagesForChat(chatId, silent = false) {
    const { data: messages } = await db.from('messages')
        .select('*')
        .eq('chat_id', chatId)
        .order('created_at', { ascending: true });
    
    const container = document.getElementById('msgs');
    
    if (!silent) {
        // Полная перезагрузка
        container.innerHTML = '';
        if (messages && messages.length > 0) {
            messages.forEach(msg => addMessageToChat(msg));
        } else {
            container.innerHTML = '<div style="text-align:center;color:var(--text2);margin-top:40px">Нет сообщений</div>';
        }
        container.scrollTop = container.scrollHeight;
    } else {
        // Только проверка новых сообщений
        const currentCount = container.querySelectorAll('.msg').length;
        if (messages && messages.length > currentCount) {
            // Есть новые сообщения - перезагружаем
            container.innerHTML = '';
            messages.forEach(msg => addMessageToChat(msg));
            container.scrollTop = container.scrollHeight;
        }
    }
}

        async function sendMessage() {
            if (!activeChatId) return;
            
            const input = document.getElementById('msgInput');
            const text = input.value.trim();
            if (!text) return;
            
            input.value = '';
            
            await db.from('messages').insert({
                chat_id: activeChatId,
                sender_id: currentUser.id,
                content: text
            });
        }

        async function createNewChat() {
            const username = prompt('Введите имя пользователя для чата:');
            if (!username || username === currentUser.username) return;
            
            const { data: foundUser } = await db.from('users')
                .select('*')
                .eq('username', username)
                .single();
            
            if (!foundUser) {
                alert('Пользователь не найден');
                return;
            }
            
            const chatName = currentUser.display_name + ' & ' + foundUser.display_name;
            
            const { data: newChat } = await db.from('chats')
                .insert({ name: chatName })
                .select()
                .single();
            
            await db.from('chat_members').insert([
                { chat_id: newChat.id, user_id: currentUser.id },
                { chat_id: newChat.id, user_id: foundUser.id }
            ]);
            
            loadChatList();
            openChat(newChat.id, chatName);
        }

        async function renameCurrentChat() {
            if (!activeChatId) {
                alert('Сначала выберите чат');
                return;
            }
            
            const currentName = document.getElementById('chatTitle').textContent;
            const newName = prompt('Введите новое название чата:', currentName);
            
            if (!newName || newName === currentName) return;
            
            await db.from('chats').update({ name: newName }).eq('id', activeChatId);
            
            document.getElementById('chatTitle').textContent = newName;
            document.getElementById('chatAva').textContent = newName[0];
            
            loadChatList();
        }

        // ============ ПРОЧЕЕ ============
        function copyTid() {
            const tid = document.getElementById('profTid').textContent;
            navigator.clipboard.writeText(tid).then(() => alert('TID скопирован!'));
        }

function doLogout() {
    // Останавливаем все подписки
    if (realtimeChannel) {
        db.removeChannel(realtimeChannel);
        realtimeChannel = null;
    }
    if (pollingInterval) {
        clearInterval(pollingInterval);
        pollingInterval = null;
    }
            
            localStorage.removeItem('touchUser');
            currentUser = null;
            activeChatId = null;
            
            hideModal('profileModal');
            document.getElementById('chatList').innerHTML = '';
            document.getElementById('msgs').innerHTML = '<div style="text-align:center;color:var(--text2);margin-top:40px">Выберите чат</div>';
            document.getElementById('chatTitle').textContent = 'Выберите чат';
            document.getElementById('chatAva').textContent = '?';
            document.getElementById('headAva').textContent = '?';
            
            showModal('authModal');
        }

        // ============ ОБРАБОТЧИКИ СОБЫТИЙ ============
        document.getElementById('authSubmitBtn').addEventListener('click', handleAuth);
        
        document.getElementById('authToggleBtn').addEventListener('click', function() {
            isLoginMode = !isLoginMode;
            document.getElementById('authTitle').textContent = isLoginMode ? 'Вход в Touch' : 'Регистрация';
            document.getElementById('authSubmitBtn').textContent = isLoginMode ? 'Войти' : 'Зарегистрироваться';
            this.textContent = isLoginMode ? 'Нет аккаунта? Зарегистрироваться' : 'Есть аккаунт? Войти';
            document.getElementById('authError').style.display = 'none';
        });

        // Поиск по чатам
        document.getElementById('searchInput').addEventListener('input', function() {
            const query = this.value.toLowerCase();
            document.querySelectorAll('.chat-item').forEach(item => {
                const name = item.querySelector('.chat-name').textContent.toLowerCase();
                item.style.display = name.includes(query) ? 'flex' : 'none';
            });
        });

        // Закрытие модальных окон по клику на фон
        document.getElementById('authModal').addEventListener('click', function(e) {
            if (e.target === this) hideModal('authModal');
        });

        console.log('✅ Touch Messenger готов к работе');
    </script>
</body>
</html>
